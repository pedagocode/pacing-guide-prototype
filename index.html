<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiddom - IM v.360 Math K</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --black:#111;--dark:#333;--mid:#666;--light:#999;--border:#D0D0D0;--bg:#F5F5F5;--white:#fff;
    --shadow:0 2px 8px rgba(0,0,0,.08);--shadow-lg:0 8px 24px rgba(0,0,0,.12);
    --radius:10px;--radius-sm:6px;--transition:0.3s cubic-bezier(.4,0,.2,1);
  }
  body{font-family:'Lexend',sans-serif;background:var(--bg);color:var(--black);min-height:100vh;overflow-x:hidden}

  /* Header */
  .header{background:var(--black);color:#fff;padding:16px 32px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
  .header-logo{font-weight:700;font-size:20px;letter-spacing:-.3px}
  .header-divider{width:1px;height:24px;background:rgba(255,255,255,.2)}
  .header-curriculum{font-size:14px;color:rgba(255,255,255,.7)}
  .header-right{margin-left:auto;display:flex;align-items:center;gap:16px}
  .header-day{background:rgba(255,255,255,.15);padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500}
  .breadcrumb{padding:12px 32px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:13px}
  .breadcrumb a{color:var(--mid);text-decoration:none;cursor:pointer}
  .breadcrumb a:hover{color:var(--black)}
  .breadcrumb .sep{color:#CCC}
  .breadcrumb .current{color:var(--black);font-weight:600}

  /* Container */
  .container{max-width:1200px;margin:0 auto;padding:24px 32px}

  /* Year View */
  .year-view{animation:fadeIn .35s ease}
  .year-title{font-size:26px;font-weight:700;margin-bottom:4px}
  .year-subtitle{font-size:14px;color:var(--mid);margin-bottom:24px}

  .timeline-wrapper{position:relative;margin-bottom:8px}
  .timeline{display:flex;gap:2px;height:88px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
  .timeline-unit{position:relative;cursor:pointer;display:flex;flex-direction:column;align-items:center;
    justify-content:center;background:var(--white);color:var(--black);transition:var(--transition);overflow:hidden;
    border-right:1px solid var(--border)}
  .timeline-unit:last-child{border-right:none}
  .timeline-unit:hover{background:#F0F0F0}
  .timeline-unit .unit-num{font-size:10px;font-weight:700;opacity:.5;text-transform:uppercase;letter-spacing:.5px}
  .timeline-unit .unit-short{font-size:10px;font-weight:600;line-height:1.25;text-align:center;
    max-width:95%;word-wrap:break-word;overflow-wrap:break-word}
  .timeline-unit .unit-days{font-size:10px;opacity:.5;margin-top:2px}

  /* Day ruler */
  .day-ruler{display:flex;gap:2px;height:22px;font-size:10px;color:var(--mid)}
  .day-ruler-seg{display:flex;align-items:center;justify-content:flex-end;padding-right:4px;
    border-right:1px solid var(--border);font-weight:500;position:relative;transition:background .3s ease}
  .day-ruler-seg:last-child{border-right:none}
  .day-ruler-seg.wk-changed{animation:wkFlash 2.5s ease}
  .day-ruler-seg .wk-shift{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:9px;font-weight:700;color:var(--black);background:#E8E8E8;border-radius:3px;
    animation:wkShiftFade 2.5s ease forwards;pointer-events:none}
  @keyframes wkFlash{0%{background:#E8E8E8}40%{background:#E8E8E8}100%{background:transparent}}
  @keyframes wkShiftFade{0%{opacity:1}60%{opacity:1}100%{opacity:0}}

  /* Curriculum Overview + Pacing Intelligence panel */
  .overview-panel{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);
    padding:20px 24px;margin-top:20px;box-shadow:var(--shadow);display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start}
  .overview-lbl{font-size:9px;font-weight:800;color:var(--light);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
  .overview-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #EEE}
  .overview-row:last-child{border-bottom:none}
  .overview-dot{width:9px;height:9px;border-radius:50%;background:var(--black);flex-shrink:0}
  .overview-name{flex:1;font-size:12px;color:var(--black)}
  .overview-meta{font-size:11px;color:var(--light);white-space:nowrap}
  .pacing-intel{background:#F8F8F8;border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px}
  .pacing-intel-title{font-size:12px;font-weight:700;color:var(--black);margin-bottom:10px}
  .pacing-intel-list{list-style:none;display:flex;flex-direction:column;gap:6px}
  .pacing-intel-list li{font-size:12px;color:var(--dark);padding-left:14px;position:relative;line-height:1.5}
  .pacing-intel-list li::before{content:'';position:absolute;left:0;top:7px;width:5px;height:5px;border-radius:50%;background:var(--black)}

  /* Unit View */
  .unit-view{animation:fadeIn .35s ease}

  /* Peek blocks */
  .peek-nav{display:flex;justify-content:space-between;margin-bottom:20px;gap:12px}
  .peek-block{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--white);
    border-radius:var(--radius);cursor:pointer;border:1px solid var(--border);transition:var(--transition);font-size:13px;color:var(--mid)}
  .peek-block:hover{border-color:var(--black);color:var(--black);box-shadow:var(--shadow)}
  .peek-block .peek-label{font-weight:600;color:var(--black)}
  .peek-block .peek-name{font-size:12px}
  .peek-placeholder{visibility:hidden}

  /* Hero tabs */
  .hero-tabs{display:flex;gap:0;margin-bottom:0;border-bottom:1px solid var(--border);background:var(--white);border-radius:var(--radius) var(--radius) 0 0;overflow:hidden}
  .hero-tab{flex:1;padding:12px 16px;font-size:13px;font-weight:600;text-align:center;cursor:pointer;
    background:var(--white);border:none;border-bottom:2px solid transparent;color:var(--mid);
    transition:var(--transition);font-family:'Lexend',sans-serif}
  .hero-tab:hover{background:#F8F8F8;color:var(--black)}
  .hero-tab.active{color:var(--black);border-bottom-color:var(--black);background:var(--white)}
  .hero-tab-label{font-size:9px;font-weight:400;color:var(--light);display:block;margin-top:2px}

  /* Hero dashboard */
  .hero-dashboard{background:var(--white);border-radius:0 0 var(--radius) var(--radius);padding:24px 28px;margin-bottom:24px;
    box-shadow:var(--shadow);border:1px solid var(--border);border-top:none}
  .hero-layout-row{display:flex;gap:32px;align-items:flex-start}
  .hero-left{display:flex;flex-direction:column;align-items:center;min-width:180px}
  .hero-label{font-size:13px;color:var(--mid);font-weight:500;margin-bottom:12px;text-align:center}
  .progress-ring{position:relative;width:120px;height:120px;margin:12px 0}
  .progress-ring svg{transform:rotate(-90deg)}
  .progress-ring circle{fill:none;stroke-width:10}
  .progress-ring .ring-bg{stroke:#E0E0E0}
  .progress-ring .ring-fg{stroke:#000;stroke-linecap:round;transition:stroke-dashoffset .8s ease}
  .progress-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:22px;font-weight:700}
  .hero-unit-label{margin-top:8px;font-size:12px;color:var(--mid)}

  .hero-right{flex:1}
  .hero-right h3{font-size:15px;font-weight:700;margin-bottom:12px}
  .gap-grid{display:flex;flex-wrap:wrap;gap:8px}
  .standard-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;
    font-size:12px;font-weight:600;cursor:default;transition:var(--transition)}
  .standard-pill.covered{background:#E8E8E8;color:var(--black);border:1px solid var(--dark)}
  .standard-pill.covered::before{content:'';display:block;width:8px;height:8px;border-radius:50%;background:var(--black)}
  .standard-pill.uncovered{background:var(--white);color:var(--light);border:1px solid var(--border)}
  .standard-pill.uncovered::before{content:'';display:block;width:8px;height:8px;border-radius:50%;background:var(--border)}
  .hero-footer{margin-top:14px;font-size:12px;color:var(--mid)}

  /* Hero 2: horizontal bar chart */
  .bar-chart{display:flex;flex-direction:column;gap:10px;margin-top:12px}
  .bar-row{display:flex;align-items:center;gap:10px}
  .bar-label{font-size:12px;font-weight:600;min-width:90px;text-align:right}
  .bar-track{flex:1;height:20px;background:#F0F0F0;border-radius:4px;overflow:hidden;border:1px solid var(--border)}
  .bar-fill{height:100%;background:var(--black);border-radius:4px 0 0 4px;transition:width .6s ease}
  .bar-value{font-size:11px;font-weight:600;min-width:36px}

  /* Hero 3: checklist */
  .checklist{list-style:none;display:flex;flex-direction:column;gap:8px;margin-top:12px}
  .checklist-item{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:#F8F8F8;border-radius:var(--radius-sm);border:1px solid var(--border)}
  .checklist-box{width:18px;height:18px;border:2px solid var(--border);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px}
  .checklist-box.checked{background:var(--black);border-color:var(--black)}
  .checklist-box.checked::after{content:'';display:block;width:5px;height:9px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);margin-top:-2px}
  .checklist-text{flex:1}
  .checklist-std{font-size:13px;font-weight:600}
  .checklist-detail{font-size:11px;color:var(--mid);margin-top:2px}
  .checklist-status{font-size:11px;font-weight:600;white-space:nowrap;margin-top:2px}

  /* Section + Lesson cards */
  .section-group{margin-bottom:28px}
  .section-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .section-letter{font-weight:700;font-size:14px;color:var(--black)}
  .section-name{font-size:15px;font-weight:600}

  .lessons-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
  .lesson-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-sm);
    padding:14px 16px;cursor:pointer;transition:var(--transition);position:relative}
  .lesson-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--dark)}
  .lesson-card.optional{border-style:dashed;opacity:.7}
  .lesson-card.optional .opt-badge{display:inline-block;font-size:10px;background:#F0F0F0;color:var(--dark);
    padding:2px 6px;border-radius:4px;font-weight:600;margin-top:6px}
  .lesson-card.completed{border-left:3px solid var(--black)}
  .lesson-card .lesson-num{font-size:11px;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:.3px}
  .lesson-card .lesson-name{font-size:13px;font-weight:600;margin-top:4px;line-height:1.35}
  .lesson-card .assess-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:4px;
    font-weight:600;margin-top:6px}
  .lesson-card .assess-badge.formative{background:#F0F0F0;color:var(--dark)}
  .lesson-card .assess-badge.summative{background:var(--black);color:#fff}

  /* Kiddom link */
  .kiddom-link{display:block;font-size:10px;font-weight:600;color:var(--mid);margin-top:6px;
    text-decoration:none;transition:color .15s}
  .kiddom-link:hover{color:var(--black);text-decoration:underline}

  /* Assessment blocks (standalone) */
  .assess-block{background:var(--white);border:2px solid var(--black);border-radius:var(--radius-sm);
    padding:14px 16px;position:relative;text-align:center}
  .assess-block .assess-type{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--mid)}
  .assess-block .assess-name{font-size:13px;font-weight:700;margin-top:4px}
  .assess-block .assess-day{font-size:11px;color:var(--mid);margin-top:4px}
  .assess-block.summative{background:var(--black);color:#fff}
  .assess-block.summative .assess-type{color:rgba(255,255,255,.6)}
  .assess-block.summative .assess-day{color:rgba(255,255,255,.6)}

  /* Adjust pacing button */
  .adjust-pacing-btn{position:fixed;bottom:28px;right:28px;background:var(--black);color:#fff;border:none;
    padding:14px 24px;border-radius:28px;font-size:14px;font-weight:600;cursor:pointer;
    box-shadow:0 4px 16px rgba(0,0,0,.25);transition:var(--transition);z-index:50;
    display:flex;align-items:center;gap:8px;font-family:'Lexend',sans-serif}
  .adjust-pacing-btn:hover{background:var(--dark);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.35)}
  .adjust-pacing-btn svg{width:18px;height:18px}
  .adjust-pacing-btn.pulsing{animation:btnPulse 2s ease-in-out infinite}
  @keyframes btnPulse{0%{box-shadow:0 4px 16px rgba(0,0,0,.25)}50%{box-shadow:0 4px 24px rgba(0,0,0,.5),0 0 0 8px rgba(0,0,0,.08)}100%{box-shadow:0 4px 16px rgba(0,0,0,.25)}}
  .adjust-pacing-btn .pulse-dot{width:8px;height:8px;border-radius:50%;background:#fff;animation:dotPulse 2s ease-in-out infinite}
  @keyframes dotPulse{0%{opacity:1}50%{opacity:.4}100%{opacity:1}}

  /* Mode selector in AI panel */
  .mode-selector{display:flex;gap:0;margin-bottom:20px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
  .mode-option{flex:1;padding:14px 16px;cursor:pointer;background:var(--white);border:none;
    font-family:'Lexend',sans-serif;font-size:13px;font-weight:500;color:var(--mid);
    transition:var(--transition);text-align:left;border-right:1px solid var(--border)}
  .mode-option:last-child{border-right:none}
  .mode-option:hover{background:#F8F8F8;color:var(--black)}
  .mode-option.active{background:var(--black);color:#fff}
  .mode-option .mode-title{font-weight:700;font-size:13px;display:block}
  .mode-option .mode-desc{font-size:11px;opacity:.7;margin-top:2px;display:block;line-height:1.35}

  /* Lesson checklist in modify mode */
  .lesson-checklist{background:#F8F8F8;border:1px solid var(--border);border-radius:var(--radius);
    padding:16px 18px;margin-bottom:20px}
  .lesson-checklist-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .lesson-checklist-title{font-size:13px;font-weight:700}
  .lesson-checklist-subtitle{font-size:11px;color:var(--mid)}
  .lesson-checklist-source{font-size:10px;color:var(--light);font-style:italic}
  .lesson-checklist-grid{display:flex;flex-direction:column;gap:2px;max-height:200px;overflow-y:auto}
  .lesson-check-row{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:4px;
    cursor:pointer;transition:background .1s;font-size:12px}
  .lesson-check-row:hover{background:#EFEFEF}
  .lesson-check-row .lc-box{width:16px;height:16px;border:2px solid var(--border);border-radius:3px;
    flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
  .lesson-check-row .lc-box.checked{background:var(--black);border-color:var(--black)}
  .lesson-check-row .lc-box.checked::after{content:'';display:block;width:4px;height:8px;
    border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);margin-top:-2px}
  .lesson-check-row .lc-name{flex:1;color:var(--dark)}
  .lesson-check-row .lc-name.completed-name{color:var(--black);font-weight:600}
  .lesson-check-row .lc-tag{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:600}
  .lesson-check-row .lc-tag.opt{background:#F0F0F0;color:var(--mid)}
  .lesson-check-row .lc-tag.auto{background:#E8E8E8;color:var(--dark)}
  .lesson-checklist-actions{display:flex;gap:8px;margin-top:10px}
  .lesson-checklist-actions button{font-size:11px;font-weight:600;padding:4px 10px;border-radius:4px;
    border:1px solid var(--border);background:var(--white);cursor:pointer;font-family:'Lexend',sans-serif;
    transition:var(--transition);color:var(--dark)}
  .lesson-checklist-actions button:hover{border-color:var(--black);color:var(--black)}

  /* System detection banner */
  .system-detect{padding:14px 18px;border-radius:var(--radius);margin-bottom:20px;font-size:13px;
    line-height:1.5;display:flex;align-items:flex-start;gap:12px;border:1px solid var(--border);background:#F8F8F8}
  .system-detect.behind{border-color:var(--black);background:#F0F0F0}
  .system-detect .detect-icon{width:32px;height:32px;border-radius:50%;background:var(--black);color:#fff;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;font-weight:700}
  .system-detect .detect-text{flex:1}
  .system-detect .detect-title{font-weight:700;margin-bottom:2px}
  .system-detect .detect-detail{font-size:12px;color:var(--mid);line-height:1.45}

  /* AI Panel overlay */
  .ai-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;
    align-items:center;justify-content:center;animation:fadeIn .25s ease}
  .ai-panel{background:var(--white);border-radius:16px;width:560px;max-width:95vw;max-height:85vh;
    overflow-y:auto;box-shadow:var(--shadow-lg);animation:slideUp .3s ease}
  .ai-panel-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 0}
  .ai-panel-header h2{font-size:18px;font-weight:700}
  .ai-close{background:none;border:none;cursor:pointer;font-size:24px;color:var(--mid);line-height:1;font-family:'Lexend',sans-serif}
  .ai-panel-body{padding:16px 24px 24px}
  /* Performance slider */
  .perf-slider-section{background:#F8F8F8;border:1px solid var(--border);border-radius:var(--radius);
    padding:20px 24px;margin-bottom:20px}
  .perf-slider-label{font-size:13px;font-weight:700;margin-bottom:14px}
  .perf-slider-wrap{position:relative;padding:0 4px}
  .perf-slider-track{display:flex;align-items:center;gap:12px}
  .perf-slider-track .track-label{font-size:11px;font-weight:600;color:var(--mid);white-space:nowrap;min-width:48px}
  .perf-slider-track .track-label:last-child{text-align:right}
  .perf-slider-track input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:6px;
    background:linear-gradient(to right,var(--black),#999,#ccc);border-radius:3px;outline:none;cursor:pointer}
  .perf-slider-track input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;
    border-radius:50%;background:var(--black);border:3px solid var(--white);box-shadow:0 1px 4px rgba(0,0,0,.3);cursor:pointer}
  .perf-slider-track input[type=range]::-moz-range-thumb{width:20px;height:20px;
    border-radius:50%;background:var(--black);border:3px solid var(--white);box-shadow:0 1px 4px rgba(0,0,0,.3);cursor:pointer}
  .perf-slider-desc{font-size:12px;color:var(--mid);margin-top:10px;line-height:1.45;min-height:32px}

  /* Modify mode */
  .ai-plan-impact.editable{border:2px solid var(--black)}
  .impact-stepper{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:4px}
  .impact-stepper button{width:24px;height:24px;border-radius:50%;border:1px solid var(--border);
    background:var(--white);cursor:pointer;font-size:14px;font-weight:700;font-family:'Lexend',sans-serif;
    display:flex;align-items:center;justify-content:center;transition:var(--transition);color:var(--black);padding:0;line-height:1}
  .impact-stepper button:hover{background:var(--black);color:#fff;border-color:var(--black)}
  .impact-num.editable{font-size:22px;min-width:28px;text-align:center}
  .ai-plan-step.excluded{opacity:.35;text-decoration:line-through}
  .ai-plan-step.modifiable{cursor:pointer;border-radius:var(--radius-sm);margin:0 -8px;padding:12px 8px;transition:background .15s}
  .ai-plan-step.modifiable:hover{background:#F8F8F8}
  .modify-helper{font-size:11px;color:var(--mid);text-align:center;margin-top:8px;line-height:1.4}

  .ai-plan-summary{background:#F8F8F8;border:1px solid var(--border);border-radius:var(--radius);
    padding:16px 20px;margin-bottom:16px;font-size:13px;line-height:1.6}
  .ai-plan-summary .plan-context{font-size:12px;color:var(--mid);margin-bottom:12px;line-height:1.5}
  .ai-plan-step{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--border)}
  .ai-plan-step:last-child{border-bottom:none}
  .ai-plan-step .step-num{width:24px;height:24px;border-radius:50%;background:var(--black);color:#fff;
    font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
  .ai-plan-step .step-body{flex:1}
  .ai-plan-step .step-title{font-size:13px;font-weight:700;margin-bottom:2px}
  .ai-plan-step .step-detail{font-size:12px;color:var(--mid);line-height:1.45}
  .ai-plan-step .step-tag{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;
    letter-spacing:.3px;padding:2px 8px;border-radius:4px;margin-top:4px}
  .ai-plan-step .tag-skip{background:#F0F0F0;color:var(--mid)}
  .ai-plan-step .tag-combine{background:#E8E8E8;color:var(--dark)}

    return KIDDOM_BASE + nodes[lessonId - 1];
  }
  return null;
}

function getKiddomAssessUrl(unitId, type) {
  const a = KIDDOM_ASSESS_NODES[unitId];
  if (a && a[type]) return KIDDOM_BASE + a[type];
  return null;
}

function openInKiddom(unitId, lessonId) {
  const url = getKiddomLessonUrl(unitId, lessonId);
  if (url) window.open(url, '_blank');
}

function openAssessInKiddom(unitId, type) {
  const url = getKiddomAssessUrl(unitId, type);
  if (url) window.open(url, '_blank');
}

// Total instructional days per unit = lesson days + assessment days (each assessment = 1 day)
function unitTotalDays(unit) { return unit.days + unit.assessments.length; }

// ============================================
// SETUP STATE (must be before scheduling engine)
// ============================================
let yearStartDate = new Date(2025, 7, 12); // Aug 12, 2025
let holidays = new Set(); // Store as 'YYYY-MM-DD' strings

function dateToKey(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function formatDateDisplay(d) {
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

// Base total (no holidays removed)
const BASE_TOTAL_DAYS = UNITS.reduce((sum, u) => sum + unitTotalDays(u), 0);

// ============================================
// CALENDAR SCHEDULING ENGINE
// ============================================
// Walks real calendar days from yearStartDate, skipping weekends + holidays,
// and maps each unit to actual calendar date ranges + week milestones.

function buildSchedule() {
  const schedule = []; // one entry per unit: { unit, startDate, endDate, calendarWeeks, instrDays }
  let cursor = new Date(yearStartDate);
  let totalInstrDays = 0;

  for (const unit of UNITS) {
    const needed = unitTotalDays(unit);
    let instrCount = 0;
    const unitStartDate = new Date(cursor);

    while (instrCount < needed) {
      const dow = cursor.getDay();
      const key = dateToKey(cursor);
      if (dow !== 0 && dow !== 6 && !holidays.has(key)) {
        instrCount++;
        totalInstrDays++;
      }
      if (instrCount < needed) {
        cursor.setDate(cursor.getDate() + 1);
      }
    }
    const unitEndDate = new Date(cursor);

    // Calendar weeks from year start to this unit's end
    const msFromStart = unitEndDate.getTime() - yearStartDate.getTime();
    const calWeeks = Math.round(msFromStart / (7 * 24 * 60 * 60 * 1000)) + 1;

    schedule.push({
      unit,
      startDate: unitStartDate,
      endDate: unitEndDate,
      calendarWeeks: calWeeks,
      instrDays: needed
    });

    // Move cursor to next day for the next unit
    cursor.setDate(cursor.getDate() + 1);
  }

  return { schedule, totalInstrDays };
}

// Compute how many instructional days have passed as of "today"
function computeCurrentDay() {
  const today = new Date(2026, 2, 24); // Simulated today: Mar 24, 2026
  let cursor = new Date(yearStartDate);
  let instrCount = 0;

  while (cursor <= today) {
    const dow = cursor.getDay();
    const key = dateToKey(cursor);
    if (dow !== 0 && dow !== 6 && !holidays.has(key)) {
      instrCount++;
    }
    cursor.setDate(cursor.getDate() + 1);
  }
  return instrCount;
}

function getTotalDays() {
  return buildSchedule().totalInstrDays;
}

function getCurrentDay() {
  return computeCurrentDay();
}

function buildStandardLessonMap(unit) {
  const allLessons = [];
  unit.sections.forEach(s => s.lessons.forEach(l => { if (!l.optional) allLessons.push(l.id); }));
  const map = {};
  const stds = unit.standards;
  stds.forEach((std, i) => {
    const chunkSize = Math.ceil(allLessons.length / stds.length);
    const start = i * chunkSize;
    map[std] = allLessons.slice(start, start + chunkSize);
  });
  return map;
}

// Detect if the class is behind for a given unit
function detectBehind(unit) {
  const { schedule } = buildSchedule();
  const entry = schedule.find(s => s.unit.id === unit.id);
  if (!entry) return { behind: false, daysUsed: 0, daysTotal: 0, pctThrough: 0 };

  const today = new Date(2026, 2, 24); // simulated today
  const unitStart = entry.startDate;
  const unitEnd = entry.endDate;

  // Compute lesson counts for all paths
  const completed = getCompleted(unit.id);
  const allNonOptional = [];
  unit.sections.forEach(s => s.lessons.forEach(l => { if (!l.optional) allNonOptional.push(l); }));
  const completedCount = allNonOptional.filter(l => completed.has(l.id)).length;

  // Next assessment
  let nextAssess = null;
  const midAssess = unit.assessments.find(a => a.type === 'formative');
  const endAssess = unit.assessments.find(a => a.type === 'summative');
  if (midAssess && completedCount < midAssess.afterLesson) {
    nextAssess = { label: midAssess.label, lessonsAway: midAssess.afterLesson - completedCount };
  } else if (endAssess) {
    nextAssess = { label: endAssess.label, lessonsAway: Math.max(0, allNonOptional.length - completedCount) };
  }

  // If we haven't started this unit yet or already past it
  if (today < unitStart) return { behind: false, daysUsed: 0, daysTotal: entry.instrDays, pctThrough: 0, status: 'upcoming', completedCount, totalRequired: allNonOptional.length, nextAssess };
  if (today > unitEnd) return { behind: completedCount < allNonOptional.length, daysUsed: entry.instrDays, daysTotal: entry.instrDays, pctThrough: 100, status: 'complete', completedCount, totalRequired: allNonOptional.length, nextAssess };

  // Count instructional days from unit start to today
  let cursor = new Date(unitStart);
  let daysUsed = 0;
  while (cursor <= today) {
    const dow = cursor.getDay();
    const key = dateToKey(cursor);
    if (dow !== 0 && dow !== 6 && !holidays.has(key)) daysUsed++;
    cursor.setDate(cursor.getDate() + 1);
  }

  // Expected progress: how many lessons should be done given days used
  const expectedProgress = Math.floor((daysUsed / entry.instrDays) * allNonOptional.length);
  const behind = completedCount < expectedProgress - 1; // 1 lesson grace

  return {
    behind,
    daysUsed,
    daysTotal: entry.instrDays,
    pctThrough: Math.round((daysUsed / entry.instrDays) * 100),
    completedCount,
    expectedProgress,
    totalRequired: allNonOptional.length,
    nextAssess,
    status: 'in-progress'
  };
}

// Helper: find combinable lesson pairs (lessons in same section covering similar standards)
// Each lesson can only appear in one pair.
function findCombinablePairs(unit, remaining) {
  const pairs = [];
  const used = new Set();
  unit.sections.forEach(section => {
    const sectionRemaining = section.lessons.filter(l => remaining.find(r => r.id === l.id) && !l.optional);
    for (let i = 0; i < sectionRemaining.length - 1; i++) {
      const a = sectionRemaining[i];
      const b = sectionRemaining[i + 1];
      // Skip if either lesson is already used in another pair
      if (used.has(a.id) || used.has(b.id)) continue;
      pairs.push({ a, b, section: section.id, reason: `Both build toward ${section.name}` });
      used.add(a.id);
      used.add(b.id);
    }
  });
  return pairs;
}

// Helper: identify high-priority lessons (those mapping to the most assessed standards)
function findHighPriorityLessons(unit, remaining) {
  const stdMap = buildStandardLessonMap(unit);
  const lessonPriority = [];
  remaining.forEach(lesson => {
    let stdCount = 0;
    const matchedStds = [];
    unit.standards.forEach(std => {
      if ((stdMap[std] || []).includes(lesson.id)) { stdCount++; matchedStds.push(std); }
    });
    lessonPriority.push({ lesson, stdCount, matchedStds });
  });
  lessonPriority.sort((a, b) => b.stdCount - a.stdCount);
  return lessonPriority;
}

function buildPerformancePlan(unit, perfVal) {
  const completed = getCompleted(unit.id);
  const allNonOptional = [];
  unit.sections.forEach(s => s.lessons.forEach(l => { if (!l.optional) allNonOptional.push(l); }));
  const remaining = allNonOptional.filter(l => !completed.has(l.id));
  const completedCount = allNonOptional.filter(l => completed.has(l.id)).length;

  const steps = [];
  let daysRecovered = 0;

  if (perfVal <= 40) {
    // Behind: aggressive, specific recommendations
    // 1. Skip optional lessons
    if (unit.optionalLessons.length > 0) {
      const optNames = unit.optionalLessons.map(id => {
        let name = '';
        unit.sections.forEach(s => s.lessons.forEach(l => { if (l.id === id) name = l.name; }));
        return `Lesson ${id}: ${name}`;
      });
      steps.push({
        title: `Skip ${unit.optionalLessons.length} optional lesson${unit.optionalLessons.length > 1 ? 's' : ''}`,
        detail: optNames.join(', ') + '. These reinforce concepts but are not assessed. Recovers ' + unit.optionalLessons.length + ' day' + (unit.optionalLessons.length > 1 ? 's' : '') + '.',
        tag: 'skip', tagClass: 'tag-skip'
      });
      daysRecovered += unit.optionalLessons.length;
    }

    // 2. Combine specific lesson pairs
    const pairs = findCombinablePairs(unit, remaining);
    const numPairs = perfVal <= 20 ? Math.min(3, pairs.length) : Math.min(2, pairs.length);
    if (numPairs > 0) {
      const pairDetails = pairs.slice(0, numPairs).map(p =>
        `Lessons ${p.a.id} + ${p.b.id} (${p.a.name} and ${p.b.name})`
      );
      steps.push({
        title: `Combine ${numPairs} lesson pair${numPairs > 1 ? 's' : ''} into extended sessions`,
        detail: pairDetails.join('. ') + '. ' + pairs.slice(0, numPairs).map(p => p.reason).join('. ') + `. Recovers ${numPairs} day${numPairs > 1 ? 's' : ''}.`,
        tag: 'combine', tagClass: 'tag-combine'
      });
      daysRecovered += numPairs;
    }

    // 3. Shorten warm-ups if severely behind
    if (perfVal <= 20) {
      steps.push({
        title: 'Shorten warm-ups to 5 minutes for remaining lessons',
        detail: 'Replace extended warm-ups with quick number talks. This frees 5 minutes per lesson for core instruction across all remaining sessions.',
        tag: 'compress', tagClass: 'tag-skip'
      });
    }

    // 4. Name specific high-priority lessons
    const priority = findHighPriorityLessons(unit, remaining);
    const topLessons = priority.slice(0, Math.min(5, priority.length));
    if (topLessons.length > 0) {
      const priorityList = topLessons.map(p =>
        `Lesson ${p.lesson.id}: ${p.lesson.name} (${p.matchedStds.join(', ')})`
      );
      steps.push({
        title: `${topLessons.length} high-priority lessons for the assessment`,
        detail: 'These lessons cover the most assessed standards. Teach these first: ' + priorityList.join('; ') + '.',
        tag: 'priority', tagClass: 'tag-keep'
      });
    }

  } else if (perfVal <= 60) {
    // On track
    steps.push({
      title: 'Continue current pacing',
      detail: `${completedCount} of ${allNonOptional.length} required lessons completed. Your class is pacing well through the unit.`,
      tag: 'on track', tagClass: 'tag-keep'
    });
    if (unit.optionalLessons.length > 0) {
      const optNames = unit.optionalLessons.map(id => {
        let name = '';
        unit.sections.forEach(s => s.lessons.forEach(l => { if (l.id === id) name = l.name; }));
        return `Lesson ${id}: ${name}`;
      });
      steps.push({
        title: 'Include optional lessons if time allows',
        detail: optNames.join(', ') + '. These provide additional practice for students who need reinforcement.',
        tag: 'optional', tagClass: 'tag-review'
      });
    }
    steps.push({
      title: 'Structured review before the assessment',
      detail: `Dedicate one day to revisiting ${unit.standards.slice(0,2).join(' and ')} through guided practice and formative checks.`,
      tag: 'review', tagClass: 'tag-review'
    });

  } else {
    // Ahead: enrich
    if (unit.optionalLessons.length > 0) {
      const optNames = unit.optionalLessons.map(id => {
        let name = '';
        unit.sections.forEach(s => s.lessons.forEach(l => { if (l.id === id) name = l.name; }));
        return `Lesson ${id}: ${name}`;
      });
      steps.push({
        title: 'Teach all lessons including optional content',
        detail: 'With extra time available, include: ' + optNames.join(', ') + '. These give students additional practice and deeper understanding.',
        tag: 'enrich', tagClass: 'tag-keep'
      });
    }
    steps.push({
      title: 'Add a reteach day for challenging standards',
      detail: `Use small-group targeted instruction to revisit ${unit.standards.slice(0,2).join(' and ')}. Pull students who scored below proficiency on the Mid-Unit Assessment.`,
      tag: 'reteach', tagClass: 'tag-review'
    });
    if (perfVal > 80) {
      const priority = findHighPriorityLessons(unit, remaining);
      const extendLessons = priority.slice(0, 3);
      const extendList = extendLessons.map(p => `Lesson ${p.lesson.id}: ${p.lesson.name}`);
      steps.push({
        title: 'Extend lessons with enrichment activities',
        detail: (extendList.length > 0 ? 'Add problem-solving challenges to ' + extendList.join(', ') + '. ' : '') + 'Include peer teaching opportunities where students explain their strategies to classmates.',
        tag: 'enrich', tagClass: 'tag-combine'
      });
    }
  }

  return { steps, daysRecovered, remaining };
}

function buildModePlan(unit, mode) {
  const completed = getCompleted(unit.id);
  const allNonOptional = [];
  unit.sections.forEach(s => s.lessons.forEach(l => { if (!l.optional) allNonOptional.push(l); }));
  const remaining = allNonOptional.filter(l => !completed.has(l.id));

  let steps = [];
  let daysRecovered = 0;
  let sliderHtml = '';

  if (mode === 'performance') {
    // Show slider, then plan based on slider value
    const perfVal = state.perfSlider || 50;
    sliderHtml = `<div class="perf-slider-section">
      <div class="perf-slider-label">Where is your class relative to grade-level expectations?</div>
      <div class="perf-slider-wrap">
        <div class="perf-slider-track">
          <span class="track-label">Behind</span>
          <input type="range" min="0" max="100" value="${perfVal}" oninput="onPerfSlider(this.value)">
          <span class="track-label">Ahead</span>
        </div>
      </div>
      <div class="perf-slider-desc" id="perfSliderDesc">${getPerfDescription(perfVal)}</div>
    </div>`;

    const plan = buildPerformancePlan(unit, perfVal);
    steps = plan.steps;
    daysRecovered = plan.daysRecovered;

  } else if (mode === 'assessment') {
    // Approaching Assessment mode: auto-detect progress toward assessment
    const completedCount = allNonOptional.filter(l => completed.has(l.id)).length;

    // Find both assessments
    const midAssess = unit.assessments.find(a => a.type === 'formative');
    const endAssess = unit.assessments.find(a => a.type === 'summative');

    // Determine which assessment to target
    // Default: auto-detect next one, but teacher can override via state.targetAssess
    let targetAssess = null;
    let lessonsUntilAssess = 0;
    const targetType = state.targetAssess || 'auto';

    if (targetType === 'mid' && midAssess) {
      targetAssess = midAssess;
      const nonOptBeforeAssess = allNonOptional.filter(l => l.id <= midAssess.afterLesson && !completed.has(l.id));
      lessonsUntilAssess = nonOptBeforeAssess.length;
    } else if (targetType === 'end' && endAssess) {
      targetAssess = endAssess;
      lessonsUntilAssess = remaining.length;
    } else {
      // Auto: pick whichever is next
      if (midAssess && completedCount < midAssess.afterLesson) {
        targetAssess = midAssess;
        const nonOptBeforeAssess = allNonOptional.filter(l => l.id <= midAssess.afterLesson && !completed.has(l.id));
        lessonsUntilAssess = nonOptBeforeAssess.length;
      } else if (endAssess) {
        targetAssess = endAssess;
        lessonsUntilAssess = remaining.length;
      }
    }

    const assessLabel = targetAssess ? targetAssess.label : 'End-of-Unit Assessment';
    const isMidTarget = targetAssess && targetAssess.type === 'formative';
    const isEndTarget = targetAssess && targetAssess.type === 'summative';

    // Progress bar: scoped to the target assessment's lesson range
    let progressTotal = allNonOptional.length;
    let progressDone = completedCount;
    if (isMidTarget && midAssess) {
      const beforeMid = allNonOptional.filter(l => l.id <= midAssess.afterLesson);
      progressTotal = beforeMid.length;
      progressDone = beforeMid.filter(l => completed.has(l.id)).length;
    }
    const progressPct = progressTotal > 0 ? Math.round((progressDone / progressTotal) * 100) : 0;

    // Assessment toggle + auto-detect summary
    const hasBoth = midAssess && endAssess;
    let toggleHtml = '';
    if (hasBoth) {
      toggleHtml = `<div style="display:flex;gap:0;margin-bottom:14px;border:1px solid var(--border);border-radius:6px;overflow:hidden">
        <button onclick="switchAssessTarget('mid')" style="flex:1;padding:8px 12px;font-size:12px;font-weight:600;border:none;cursor:pointer;font-family:'Lexend',sans-serif;transition:all .15s;${isMidTarget ? 'background:var(--black);color:#fff' : 'background:var(--white);color:var(--mid)'}">${midAssess.label}</button>
        <button onclick="switchAssessTarget('end')" style="flex:1;padding:8px 12px;font-size:12px;font-weight:600;border:none;border-left:1px solid var(--border);cursor:pointer;font-family:'Lexend',sans-serif;transition:all .15s;${isEndTarget ? 'background:var(--black);color:#fff' : 'background:var(--white);color:var(--mid)'}">${endAssess.label}</button>
      </div>`;
    }

    sliderHtml = `<div class="perf-slider-section" style="display:block">
      ${toggleHtml}
      <div style="display:flex;justify-content:space-between;margin-bottom:12px">
        <div>
          <div style="font-size:13px;font-weight:700">Progress toward ${assessLabel}</div>
          <div style="font-size:12px;color:var(--mid);margin-top:2px">${progressDone} of ${progressTotal} required lessons completed</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:22px;font-weight:700">${lessonsUntilAssess}</div>
          <div style="font-size:11px;color:var(--mid)">lessons remaining</div>
        </div>
      </div>
      <div style="height:6px;background:#E0E0E0;border-radius:3px;overflow:hidden">
        <div style="height:100%;background:var(--black);border-radius:3px;width:${progressPct}%;transition:width .6s ease"></div>
      </div>
    </div>`;

    // Scope remaining lessons to target assessment
    let scopedRemaining = remaining;
    if (isMidTarget && midAssess) {
      scopedRemaining = allNonOptional.filter(l => l.id <= midAssess.afterLesson && !completed.has(l.id));
    }

    // Identify which remaining lessons directly map to assessed standards
    const stdMap = buildStandardLessonMap(unit);
    const criticalLessonIds = new Set();
    unit.standards.forEach(std => {
      (stdMap[std] || []).forEach(id => {
        if (scopedRemaining.find(l => l.id === id)) criticalLessonIds.add(id);
      });
    });

    if (criticalLessonIds.size > 0) {
      const criticalNames = [...criticalLessonIds].map(id => {
        let name = '';
        unit.sections.forEach(s => s.lessons.forEach(l => { if (l.id === id) name = l.name; }));
        return `Lesson ${id}: ${name}`;
      });
      steps.push({
        title: `${criticalLessonIds.size} lesson${criticalLessonIds.size !== 1 ? 's' : ''} directly map to assessed standards`,
        detail: 'Teach these to maximize assessment readiness: ' + criticalNames.join(', ') + '.',
        tag: 'critical', tagClass: 'tag-keep'
      });
    }

    if (unit.optionalLessons.length > 0) {
      const optRemaining = unit.optionalLessons.filter(id => !completed.has(id));
      if (optRemaining.length > 0) {
        const optNames = optRemaining.map(id => {
          let name = '';
          unit.sections.forEach(s => s.lessons.forEach(l => { if (l.id === id) name = l.name; }));
          return `Lesson ${id}: ${name}`;
        });
        steps.push({
          title: `Skip ${optRemaining.length} optional lesson${optRemaining.length !== 1 ? 's' : ''} to reach the assessment faster`,
          detail: optNames.join(', ') + '. Not required for assessment topics. Recovers ' + optRemaining.length + ' day' + (optRemaining.length !== 1 ? 's' : '') + '.',
          tag: 'skip', tagClass: 'tag-skip'
        });
        daysRecovered += optRemaining.length;
      }
    }

    // If many lessons remain, suggest combining
    if (lessonsUntilAssess > 5) {
      const pairs = findCombinablePairs(unit, scopedRemaining);
      if (pairs.length > 0) {
        const pair = pairs[0];
        steps.push({
          title: 'Combine 1 lesson pair to save a day',
          detail: `Lessons ${pair.a.id} + ${pair.b.id} (${pair.a.name} and ${pair.b.name}). ${pair.reason}. Recovers 1 day.`,
          tag: 'combine', tagClass: 'tag-combine'
        });
        daysRecovered += 1;
      }
    }

    steps.push({
      title: 'Add a structured review session before the assessment',
      detail: `Dedicate one day to revisiting ${unit.standards.slice(0,2).join(' and ')} through guided practice and formative checks.`,
      tag: 'review', tagClass: 'tag-review'
    });
  }

  let stepsHtml = sliderHtml;
  stepsHtml += `<div style="font-size:12px;font-weight:600;color:var(--mid);text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px">Suggested Plan</div>`;

  steps.forEach((s, i) => {
    stepsHtml += `<div class="ai-plan-step">
      <div class="step-num">${i + 1}</div>
      <div class="step-body">
        <div class="step-title">${s.title}</div>
        <div class="step-detail">${s.detail}</div>
        <span class="step-tag ${s.tagClass}">${s.tag}</span>
      </div>
    </div>`;
  });

  // Days lost = how many days behind schedule. Computed from detection or remaining vs expected.
  const detection = detectBehind(unit);
  const daysLost = Math.max(0, (detection.daysUsed || 0) - (detection.completedCount || 0));
  const lessonsAfterPlan = remaining.length - daysRecovered;

  stepsHtml += `<div class="ai-plan-impact">
    <div class="impact-item">
      <div class="impact-num">${daysLost}</div>
      <div class="impact-label">Days lost</div>
    </div>
    <div class="impact-item">
      <div class="impact-num">${Math.max(0, lessonsAfterPlan)}</div>
      <div class="impact-label">Lessons remaining</div>
    </div>
    <div class="impact-item">
      <div class="impact-num">${unit.standards.length}</div>
      <div class="impact-label">Standards covered</div>
    </div>
  </div>`;

  stepsHtml += `<div class="ai-plan-actions">
    <button class="btn-confirm" onclick="confirmPlan(${unit.id})">Confirm Plan</button>
    <button class="btn-adjust" onclick="enableModify(${unit.id})">Modify</button>
  </div>`;

  return stepsHtml;
}

function onPerfSlider(val) {
  state.perfSlider = parseInt(val);
  const desc = document.getElementById('perfSliderDesc');
  if (desc) desc.textContent = getPerfDescription(state.perfSlider);
  // Re-render just the plan steps (below the slider)
  const unit = UNITS.find(x => x.id === state.unitId);
  if (unit) {
    // Rebuild the full mode plan and extract just the steps portion
    const planArea = document.getElementById('aiPlanArea');
    if (planArea) planArea.innerHTML = buildModePlan(unit, 'performance');
  }
}

function getPerfDescription(val) {
  if (val <= 20) return 'Significantly behind. The plan will aggressively compress by skipping optional content, combining lessons, and shortening warm-ups.';
  if (val <= 40) return 'Somewhat behind. The plan will skip optional lessons and combine a few sessions to recover instructional days.';
  if (val <= 60) return 'On track. Current pacing is appropriate. The plan focuses on maintaining momentum and preparing for the assessment.';
  if (val <= 80) return 'Slightly ahead. The plan adds review days and includes optional lessons to deepen understanding.';
  return 'Well ahead. The plan adds reteach opportunities, optional enrichment, and extra assessment prep time.';
}

function renderAIPanel(unit) {
  const mode = state.aiMode || 'performance';

  let html = `<div class="ai-overlay" onclick="if(event.target===this)closeAIPanel()">
    <div class="ai-panel">
      <div class="ai-panel-header">
        <h2>Adjust Pacing: Unit ${unit.id}</h2>
        <button class="ai-close" onclick="closeAIPanel()">&times;</button>
      </div>
      <div class="ai-panel-body">
        <div class="mode-selector">
          <button class="mode-option${mode === 'assessment' ? ' active' : ''}" onclick="switchAIMode('assessment')">
            <span class="mode-title">Approaching Assessment</span>
            <span class="mode-desc">Focus on what matters most for the upcoming assessment</span>
          </button>
          <button class="mode-option${mode === 'performance' ? ' active' : ''}" onclick="switchAIMode('performance')">
            <span class="mode-title">Standards Mastery</span>
            <span class="mode-desc">Adjust based on where your class is relative to expectations</span>
          </button>
        </div>

        <div id="aiPlanArea">${buildModePlan(unit, mode)}</div>
      </div>
    </div>
  </div>`;
  return html;
}

let modifyState = { daysRecovered: 0, lessonsRemaining: 0, active: false };

function enableModify(unitId) {
  const unit = UNITS.find(u => u.id === unitId);
  if (!unit) return;

  modifyState.active = true;

  // Read current impact values
  const impactNums = document.querySelectorAll('.ai-plan-impact .impact-num');
  if (impactNums.length >= 2) {
    modifyState.daysRecovered = parseInt(impactNums[0].textContent) || 0;
    modifyState.lessonsRemaining = parseInt(impactNums[1].textContent) || 0;
  }

  // ---- Insert lesson completion checklist above the suggested plan ----
  const planLabel = document.querySelector('#aiPlanArea .perf-slider-section');
  const suggestedLabel = document.querySelector('#aiPlanArea div[style*="SUGGESTED"]') ||
    [...document.querySelectorAll('#aiPlanArea div')].find(d => d.textContent.trim() === 'Suggested Plan');

  // Build checklist
  const completed = getCompleted(unit.id);
  const allLessons = [];
  unit.sections.forEach(s => s.lessons.forEach(l => allLessons.push(l)));

  // Simulate auto-detection: in real product, Kiddom would pre-fill from assignment data.
  // For prototype, we pre-fill ~40% of lessons as "detected completed" to show the concept.
  const simulatedAutoDetect = new Set();
  const simCount = Math.floor(allLessons.filter(l => !l.optional).length * 0.4);
  allLessons.filter(l => !l.optional).slice(0, simCount).forEach(l => simulatedAutoDetect.add(l.id));
  // Merge with any manually completed
  completed.forEach(id => simulatedAutoDetect.add(id));

  let checklistHtml = `<div class="lesson-checklist" id="lessonChecklist">
    <div class="lesson-checklist-header">
      <div>
        <div class="lesson-checklist-title">Confirm lessons taught</div>
        <div class="lesson-checklist-subtitle">Pre-filled from assignment data. Adjust if needed.</div>
      </div>
      <div class="lesson-checklist-source">Auto-detected from Kiddom</div>
    </div>
    <div class="lesson-checklist-grid">`;

  allLessons.forEach(l => {
    const isChecked = simulatedAutoDetect.has(l.id);
    const isOpt = l.optional;
    if (isChecked && !completed.has(l.id)) {
      // Sync simulated completions to actual state for plan calculation
      completed.add(l.id);
    }
    checklistHtml += `<div class="lesson-check-row" onclick="toggleLessonCheck(${unitId},${l.id},this)">
      <div class="lc-box${isChecked ? ' checked' : ''}"></div>
      <span class="lc-name${isChecked ? ' completed-name' : ''}">Lesson ${l.id}: ${l.name}</span>
      ${isOpt ? '<span class="lc-tag opt">Optional</span>' : ''}
      ${isChecked ? '<span class="lc-tag auto">Detected</span>' : ''}
    </div>`;
  });

  checklistHtml += `</div>
    <div class="lesson-checklist-actions">
      <button onclick="checklistSelectAll(${unitId})">Select all</button>
      <button onclick="checklistClearAll(${unitId})">Clear all</button>
    </div>
  </div>`;

  // Insert checklist before the Suggested Plan label
  const planArea = document.getElementById('aiPlanArea');
  if (planArea) {
    // Find the "Suggested Plan" label and insert before it
    const allDivs = planArea.children;
    let insertBefore = null;
    for (let i = 0; i < allDivs.length; i++) {
      if (allDivs[i].textContent.trim() === 'Suggested Plan') {
        insertBefore = allDivs[i];
        break;
      }
    }
    const checklistContainer = document.createElement('div');
    checklistContainer.id = 'checklistContainer';
    checklistContainer.innerHTML = checklistHtml;
    if (insertBefore) {
      planArea.insertBefore(checklistContainer, insertBefore);
    } else {
      // Insert after the progress section
      const perfSection = planArea.querySelector('.perf-slider-section');
      if (perfSection && perfSection.nextSibling) {
        planArea.insertBefore(checklistContainer, perfSection.nextSibling);
      }
    }

    // Rebuild the plan with the updated completions
    rebuildPlanSteps(unitId);
  }

  // Transform impact section into editable steppers
  const impactEl = document.querySelector('.ai-plan-impact');
  if (impactEl) {
    impactEl.classList.add('editable');
    impactEl.innerHTML = `
      <div class="impact-item">
        <div class="impact-num editable" id="modDays">${modifyState.daysRecovered}</div>
        <div class="impact-label">Days lost</div>
        <div class="impact-stepper">
          <button onclick="modifyImpact('days',-1,${unitId})">-</button>
          <button onclick="modifyImpact('days',1,${unitId})">+</button>
        </div>
      </div>
      <div class="impact-item">
        <div class="impact-num editable" id="modLessons">${modifyState.lessonsRemaining}</div>
        <div class="impact-label">Lessons remaining</div>
        <div class="impact-stepper">
          <button onclick="modifyImpact('lessons',-1,${unitId})">-</button>
          <button onclick="modifyImpact('lessons',1,${unitId})">+</button>
        </div>
      </div>
      <div class="impact-item">
        <div class="impact-num">${unit.standards.length}</div>
        <div class="impact-label">Standards covered</div>
      </div>`;
  }

  // Make steps toggleable
  const steps = document.querySelectorAll('.ai-plan-step');
  steps.forEach(s => {
    s.classList.add('modifiable');
    if (!s.dataset.bound) {
      s.dataset.bound = 'true';
      s.addEventListener('click', function() {
        this.classList.toggle('excluded');
        recalcModifyImpact(unitId);
      });
    }
  });

  // Update button
  const modifyBtn = document.querySelector('.btn-adjust');
  if (modifyBtn) {
    modifyBtn.textContent = 'Reset';
    modifyBtn.onclick = function() { resetModify(unitId); };
  }

  // Add helper
  const actionsDiv = document.querySelector('.ai-plan-actions');
  if (actionsDiv && !document.getElementById('modifyHelper')) {
    const helper = document.createElement('div');
    helper.id = 'modifyHelper';
    helper.className = 'modify-helper';
    helper.textContent = 'Confirm which lessons are taught, then use +/- to adjust targets or click steps to exclude them.';
    actionsDiv.parentNode.insertBefore(helper, actionsDiv.nextSibling);
  }
}

function toggleLessonCheck(unitId, lessonId, row) {
  const box = row.querySelector('.lc-box');
  const name = row.querySelector('.lc-name');
  const completed = getCompleted(unitId);
  const autoTag = row.querySelector('.lc-tag.auto');

  if (box.classList.contains('checked')) {
    box.classList.remove('checked');
    name.classList.remove('completed-name');
    completed.delete(lessonId);
    if (autoTag) autoTag.remove();
  } else {
    box.classList.add('checked');
    name.classList.add('completed-name');
    completed.add(lessonId);
  }
  // Rebuild the plan with updated completions
  rebuildPlanSteps(unitId);
}

function checklistSelectAll(unitId) {
  const unit = UNITS.find(u => u.id === unitId);
  if (!unit) return;
  const completed = getCompleted(unitId);
  unit.sections.forEach(s => s.lessons.forEach(l => completed.add(l.id)));
  // Update all checkboxes
  document.querySelectorAll('.lesson-check-row').forEach(row => {
    row.querySelector('.lc-box').classList.add('checked');
    row.querySelector('.lc-name').classList.add('completed-name');
  });
  rebuildPlanSteps(unitId);
}

function checklistClearAll(unitId) {
  const completed = getCompleted(unitId);
  completed.clear();
  document.querySelectorAll('.lesson-check-row').forEach(row => {
    row.querySelector('.lc-box').classList.remove('checked');
    row.querySelector('.lc-name').classList.remove('completed-name');
  });
  rebuildPlanSteps(unitId);
}

function rebuildPlanSteps(unitId) {
  const unit = UNITS.find(u => u.id === unitId);
  if (!unit) return;

  // Rebuild just the steps + impact, preserving the checklist and progress section
  const completed = getCompleted(unitId);
  const allNonOptional = [];
  unit.sections.forEach(s => s.lessons.forEach(l => { if (!l.optional) allNonOptional.push(l); }));
  const remaining = allNonOptional.filter(l => !completed.has(l.id));
  const completedCount = allNonOptional.filter(l => completed.has(l.id)).length;

  // Update the progress display
  const progressSection = document.querySelector('#aiPlanArea .perf-slider-section');
  if (progressSection) {
    // Find and update the completed count text
    const progText = progressSection.querySelectorAll('div');
    progText.forEach(d => {
      if (d.textContent.includes('required lessons completed')) {
        // Determine scope
        const midAssess = unit.assessments.find(a => a.type === 'formative');
        const targetType = state.targetAssess || 'auto';
        const isMid = (targetType === 'mid') || (targetType === 'auto' && midAssess && completedCount < midAssess.afterLesson);

        let scopeTotal = allNonOptional.length;
        let scopeDone = completedCount;
        let scopeRemaining = remaining.length;
        if (isMid && midAssess) {
          const beforeMid = allNonOptional.filter(l => l.id <= midAssess.afterLesson);
          scopeTotal = beforeMid.length;
          scopeDone = beforeMid.filter(l => completed.has(l.id)).length;
          scopeRemaining = beforeMid.filter(l => !completed.has(l.id)).length;
        }
        d.textContent = `${scopeDone} of ${scopeTotal} required lessons completed`;
      }
    });
    // Update the big number
    const bigNum = progressSection.querySelector('div[style*="font-size:22px"], div[style*="font-size: 22px"]');
    if (bigNum) {
      const midAssess = unit.assessments.find(a => a.type === 'formative');
      const targetType = state.targetAssess || 'auto';
      const isMid = (targetType === 'mid') || (targetType === 'auto' && midAssess && completedCount < midAssess.afterLesson);
      let scopeRemaining = remaining.length;
      if (isMid && midAssess) {
        scopeRemaining = allNonOptional.filter(l => l.id <= midAssess.afterLesson && !completed.has(l.id)).length;
      }
      bigNum.textContent = scopeRemaining;
    }
    // Update progress bar
    const bar = progressSection.querySelector('div[style*="background:var(--black)"]');
    if (bar) {
      const midAssess = unit.assessments.find(a => a.type === 'formative');
      const targetType = state.targetAssess || 'auto';
      const isMid = (targetType === 'mid') || (targetType === 'auto' && midAssess && completedCount < midAssess.afterLesson);
      let scopeTotal = allNonOptional.length;
      let scopeDone = completedCount;
      if (isMid && midAssess) {
        const beforeMid = allNonOptional.filter(l => l.id <= midAssess.afterLesson);
        scopeTotal = beforeMid.length;
        scopeDone = beforeMid.filter(l => completed.has(l.id)).length;
      }
      bar.style.width = (scopeTotal > 0 ? Math.round((scopeDone / scopeTotal) * 100) : 0) + '%';
    }
  }

  // Update impact numbers
  const daysEl = document.getElementById('modDays');
  const lessonsEl = document.getElementById('modLessons');
  if (daysEl) {
    // Recalculate available recovery
    const optSkippable = unit.optionalLessons.filter(id => !completed.has(id));
    const pairs = findCombinablePairs(unit, remaining);
    modifyState.daysRecovered = optSkippable.length + pairs.length;
    daysEl.textContent = modifyState.daysRecovered;
  }
  if (lessonsEl) {
    modifyState.lessonsRemaining = remaining.length;
    lessonsEl.textContent = remaining.length;
  }
}

function modifyImpact(type, delta, unitId) {
  if (type === 'days') {
    modifyState.daysRecovered = Math.max(0, modifyState.daysRecovered + delta);
    const el = document.getElementById('modDays');
    if (el) el.textContent = modifyState.daysRecovered;
  } else if (type === 'lessons') {
    modifyState.lessonsRemaining = Math.max(0, modifyState.lessonsRemaining + delta);
    const el = document.getElementById('modLessons');
    if (el) el.textContent = modifyState.lessonsRemaining;
  }
  // Update plan suggestions based on new targets
  updatePlanForTargets(unitId);
}

function updatePlanForTargets(unitId) {
  const unit = UNITS.find(u => u.id === unitId);
  if (!unit) return;

  const completed = getCompleted(unit.id);
  const allNonOptional = [];
  unit.sections.forEach(s => s.lessons.forEach(l => { if (!l.optional) allNonOptional.push(l); }));
  const remaining = allNonOptional.filter(l => !completed.has(l.id));

  const targetDays = modifyState.daysRecovered;
  const targetLessons = modifyState.lessonsRemaining;
  const lessonsToRemove = remaining.length - targetLessons;

  // Build a recommendation note
  let noteHtml = '';
  if (lessonsToRemove > 0 && targetDays > 0) {
    // Figure out how to hit both targets
    const optSkippable = unit.optionalLessons.filter(id => !completed.has(id));
    const pairsAvailable = findCombinablePairs(unit, remaining);
    const fromOpt = Math.min(optSkippable.length, targetDays);
    const fromCombine = Math.min(pairsAvailable.length, Math.max(0, targetDays - fromOpt));

    let recs = [];
    if (fromOpt > 0) {
      const optNames = optSkippable.slice(0, fromOpt).map(id => {
        let n = ''; unit.sections.forEach(s => s.lessons.forEach(l => { if (l.id === id) n = l.name; })); return `Lesson ${id}: ${n}`;
      });
      recs.push(`Skip ${fromOpt} optional: ${optNames.join(', ')}`);
    }
    if (fromCombine > 0) {
      const combNames = pairsAvailable.slice(0, fromCombine).map(p => `Lessons ${p.a.id}+${p.b.id}`);
      recs.push(`Combine ${fromCombine} pair${fromCombine > 1 ? 's' : ''}: ${combNames.join(', ')}`);
    }
    if (recs.length > 0) {
      noteHtml = `<div style="font-size:12px;color:var(--dark);background:#F8F8F8;border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;margin-top:10px;line-height:1.45">
        <strong>To reach your targets:</strong> ${recs.join('. ')}.
      </div>`;
    }
  }

  // Insert/update recommendation
  let noteEl = document.getElementById('modifyRec');
  if (noteHtml) {
    if (noteEl) {
      noteEl.innerHTML = noteHtml;
    } else {
      const impactEl = document.querySelector('.ai-plan-impact');
      if (impactEl) {
        const div = document.createElement('div');
        div.id = 'modifyRec';
        div.innerHTML = noteHtml;
        impactEl.parentNode.insertBefore(div, impactEl.nextSibling);
      }
    }
  } else if (noteEl) {
    noteEl.innerHTML = '';
  }
}

function recalcModifyImpact(unitId) {
  // Count excluded steps and adjust days
  const steps = document.querySelectorAll('.ai-plan-step');
  let excludedCount = 0;
  steps.forEach(s => { if (s.classList.contains('excluded')) excludedCount++; });

  // Simple heuristic: each excluded step roughly adjusts days by 1
  const unit = UNITS.find(u => u.id === unitId);
  if (!unit) return;
  const completed = getCompleted(unit.id);
  const allNonOptional = [];
  unit.sections.forEach(s => s.lessons.forEach(l => { if (!l.optional) allNonOptional.push(l); }));
  const remaining = allNonOptional.filter(l => !completed.has(l.id));

  // Recalc from original plan minus excluded
  const origDays = modifyState.daysRecovered;
  const adjustedDays = Math.max(0, origDays - excludedCount);
  const adjustedLessons = remaining.length - adjustedDays;

  const daysEl = document.getElementById('modDays');
  const lessonsEl = document.getElementById('modLessons');
  if (daysEl) daysEl.textContent = adjustedDays;
  if (lessonsEl) lessonsEl.textContent = Math.max(0, adjustedLessons);
}

function resetModify(unitId) {
  modifyState.active = false;
  const unit = UNITS.find(u => u.id === unitId);
  if (unit) {
    const planArea = document.getElementById('aiPlanArea');
    if (planArea) planArea.innerHTML = buildModePlan(unit, state.aiMode);
  }
}

function confirmPlan(unitId) {
  // Show a confirmation banner briefly
  const unit = UNITS.find(u => u.id === unitId);
  closeAIPanel();
  // Add a temporary notification
  const notification = document.createElement('div');
  notification.style.cssText = 'position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--black);color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:600;font-family:Lexend,sans-serif;z-index:500;box-shadow:0 4px 16px rgba(0,0,0,.25);animation:slideUp .3s ease';
  notification.textContent = `Plan confirmed for Unit ${unitId}. Timeline updated.`;
  document.body.appendChild(notification);
  setTimeout(() => { if (notification.parentNode) notification.parentNode.removeChild(notification); }, 3000);
}

function renderLessonView(unit, section, lesson) {
  const completed = getCompleted(unit.id);
  const isCompleted = completed.has(lesson.id);
  const assess = unit.assessments.find(a => a.afterLesson === lesson.id);
  const stdMap = buildStandardLessonMap(unit);
  const lessonStds = unit.standards.filter(std => (stdMap[std]||[]).includes(lesson.id));
  const displayStds = lessonStds.length > 0 ? lessonStds : unit.standards.slice(0, 3);
  const kiddomUrl = getKiddomLessonUrl(unit.id, lesson.id);

  // Prev/next lesson navigation
  const allLessons = [];
  unit.sections.forEach(s => s.lessons.forEach(l => allLessons.push(l)));
  const idx = allLessons.findIndex(l => l.id === lesson.id);
  const prev = idx > 0 ? allLessons[idx-1] : null;
  const next = idx < allLessons.length - 1 ? allLessons[idx+1] : null;

  // Activity sequence data from Kiddom MCP
  const lessonData = (LESSON_ACTIVITY_DATA[lesson.id]) || null;
  const activities = lessonData ? lessonData.activities.map((a, i) => {
    const isWarmup = a.label === 'Warm-Up';
    const isSynthesis = a.label === 'Lesson Synthesis';
    const isCooldown = a.label === 'Cool-Down';
    return {
      type: isWarmup ? 'warmup' : (isCooldown ? 'cooldown' : (isSynthesis ? 'synthesis' : 'activity')),
      headerCls: isWarmup ? 'warmup' : (isCooldown ? 'cooldown' : (isSynthesis ? 'cooldown' : 'activity')),
      label: a.label, time: a.time,
      title: (isSynthesis && !a.title) ? 'Lesson Synthesis' : a.title,
      desc: a.desc,
      stds: isWarmup ? displayStds.slice(0,1) : (isSynthesis || isCooldown ? [] : displayStds.slice(0,2)),
      assessed: isCooldown || isSynthesis,
      grouping: a.grouping,
      transitionNote: ''
    };
  }) : [
    {type:'warmup', headerCls:'warmup', label:'Warm-Up', time:'10 min',
     title:'Warm-Up Activity', desc:'Students engage in a warm-up routine.',
     stds: displayStds.slice(0,1), assessed: false, grouping: 'Whole Class', transitionNote: ''},
    {type:'activity', headerCls:'activity', label:'Activity 1', time:'25 min',
     title:'Main Activity', desc:'Students work on the main lesson activity.',
     stds: displayStds.slice(0,2), assessed: false, grouping: 'Partners', transitionNote: ''},
    {type:'synthesis', headerCls:'cooldown', label:'Lesson Synthesis', time:'5 min',
     title:'Lesson Synthesis', desc:'Students reflect on what they learned.',
     stds: [], assessed: true, grouping: 'Whole Class', transitionNote: ''}
  ];

  // I Can Statements (generated from lesson context)
  const iCanStatements = [
    'I can represent this idea in two different ways',
    'I can explain my thinking to a partner',
    'I can check my work'
  ];

  // Materials from Kiddom data or fallback
  const materials = lessonData ? lessonData.materials : ['Counters (two-color)', 'Pattern blocks', 'Whiteboards and markers', 'Math journals'];

  // Compute total lesson time from activities
  const totalTime = activities.reduce((sum, a) => {
    const mins = parseInt(a.time) || 0;
    return sum + mins;
  }, 0);

  let html = `<div class="lesson-view"><div class="lesson-layout">`;

  // ---- MAIN COLUMN ----
  html += `<div class="lesson-main">`;

  // Prev/Next nav at top
  html += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">`;
  if (prev) {
    html += `<div onclick="goLesson(${unit.id},${prev.id})" style="cursor:pointer;display:flex;align-items:center;gap:8px">
      <span style="font-size:16px">&larr;</span>
      <div><div style="font-size:11px;color:var(--mid)">Previous</div><div style="font-size:13px;font-weight:600">Lesson ${prev.id}: ${prev.name}</div></div>
    </div>`;
  } else {
    html += `<div></div>`;
  }
  if (next) {
    html += `<div onclick="goLesson(${unit.id},${next.id})" style="cursor:pointer;display:flex;align-items:center;gap:8px;text-align:right">
      <div><div style="font-size:11px;color:var(--mid)">Next</div><div style="font-size:13px;font-weight:600">Lesson ${next.id}: ${next.name}</div></div>

    <div class="lesson-header-text">
      <h2>Lesson ${lesson.id}: ${lesson.name}</h2>
      <div class="lesson-subtitle">Unit ${unit.id} &middot; ${totalTime} min total${lesson.optional ? ' &middot; Optional' : ''}</div>
    </div>
  </div>`;

  // Description
  html += `<div class="lesson-desc">Students practice ${lesson.name.toLowerCase()} using multiple representations and explain their thinking to a partner.</div>`;

  // Activity Sequence
  html += `<div class="activity-seq-label">Activity Sequence</div>`;
  html += `<div class="activity-seq">`;
  activities.forEach((a, i) => {
    html += `<div class="activity-card">
      <div class="activity-card-header ${a.headerCls}">
        <span>${a.label}</span><span>${a.time}</span>
      </div>
      <div class="activity-card-body">
        <h4>${a.title}</h4>
        <p>${a.desc}</p>

    a.stds.forEach(s => { html += `<span class="atag">${s}</span>`; });
    if (a.assessed) html += `<span class="atag atag-assessed">Assessed</span>`;
    html += `</div>
        <div style="font-size:11px;color:var(--mid);margin-top:8px;display:flex;align-items:center;gap:4px">
          <span style="font-weight:600">${a.grouping}</span>
        </div>
      </div></div>`;
    if (i < activities.length - 1) {
      html += `<div class="activity-arrow" title="${activities[i].transitionNote || ''}">&rarr;</div>`;
    }
  });
  html += `</div>`;

  // Assessment notice
  if (assess) {
    html += `<div style="margin-top:24px;padding:14px 18px;border-radius:var(--radius);background:#F0F0F0;font-size:13px;font-weight:600;color:var(--black);border:1px solid var(--border)">
      ${assess.label} follows this lesson
    </div>`;
  }

  // Prev/Next navigation
  html += `<div style="display:flex;justify-content:space-between;align-items:center;margin-top:32px;padding-top:24px;border-top:1px solid var(--border)">`;
  if (prev) {
    html += `<div onclick="goLesson(${unit.id},${prev.id})" style="cursor:pointer;display:flex;align-items:center;gap:8px">
      <span style="font-size:16px">&larr;</span>
      <div><div style="font-size:11px;color:var(--mid)">Previous</div><div style="font-size:13px;font-weight:600">Lesson ${prev.id}: ${prev.name}</div></div>
    </div>`;
  } else {
    html += `<div></div>`;
  }
  if (next) {
    html += `<div onclick="goLesson(${unit.id},${next.id})" style="cursor:pointer;display:flex;align-items:center;gap:8px;text-align:right">
      <div><div style="font-size:11px;color:var(--mid)">Next</div><div style="font-size:13px;font-weight:600">Lesson ${next.id}: ${next.name}</div></div>
      <span style="font-size:16px">&rarr;</span>
    </div>`;
  } else {
    html += `<div></div>`;
  }
  html += `</div>`;

  html += `</div>`; // end lesson-main

  // ---- SIDEBAR ----
  html += `<div class="lesson-sidebar">`;
  html += `<div class="sidebar-title">Lesson ${lesson.id}: ${lesson.name}</div>`;
  html += `<div class="sidebar-subtitle">Unit ${unit.id} &middot; ${totalTime} min total</div>`;

  // Learning Goal
  html += `<div class="sidebar-section">
    <div class="sidebar-section-label">Learning Goal</div>
    <p>Students practice ${lesson.name.toLowerCase()} using multiple representations and explain their thinking to a partner.</p>
  </div>`;

  // I Can Statements
  html += `<div class="sidebar-section">
    <div class="sidebar-section-label">I Can Statements</div>`;
  iCanStatements.forEach(s => {

  });
  html += `</div>`;

  // Standards
  html += `<div class="sidebar-section">
    <div class="sidebar-section-label">Standards</div>
    <div class="sidebar-std-tags">`;
  displayStds.forEach(s => { html += `<span class="sidebar-std-tag">${s}</span>`; });
  html += `</div></div>`;

  // Materials
  html += `<div class="sidebar-section">
    <div class="sidebar-section-label">Materials</div>
    <ul>`;
  materials.forEach(m => { html += `<li>${m}</li>`; });
  html += `</ul></div>`;

  // Grouping sequence
  html += `<div class="sidebar-section">
    <div class="sidebar-section-label">Grouping</div>
    <ul>`;
  activities.forEach((a, i) => {
    html += `<li><strong>${a.label}:</strong> ${a.grouping}</li>`;
    if (a.transitionNote && i < activities.length - 1) {
      html += `<li style="font-size:11px;color:var(--mid);font-style:italic;padding:1px 0">${a.transitionNote}</li>`;
    }
  });
  html += `</ul></div>`;

  // Actions
  html += `<div style="margin-top:20px;display:flex;flex-direction:column;gap:8px">
    <button class="status-toggle ${isCompleted ? 'completed-toggle' : ''}" onclick="toggleComplete(${unit.id},${lesson.id})" style="width:100%;justify-content:center">
      ${isCompleted ? 'Completed' : 'Mark as Complete'}

  if (kiddomUrl) {
    html += `<a href="${kiddomUrl}" target="_blank" style="display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border-radius:8px;border:1px solid var(--border);font-size:13px;font-weight:600;color:var(--black);text-decoration:none;transition:all .15s;font-family:'Lexend',sans-serif" onmouseover="this.style.borderColor='var(--black)'" onmouseout="this.style.borderColor='var(--border)'">Full Lesson Details &rarr;</a>`;
  }
  html += `</div>`;

  html += `</div>`; // end sidebar

  html += `</div></div>`; // end layout, end lesson-view
  return html;
}

// ---- Holiday Calendar Modal ----
let preHolidayWeeks = null; // Snapshot of week milestones before opening modal
let calViewYear = 2025;
let calViewMonth = 7; // Aug (0-indexed)

function openHolidayModal() {
  // Snapshot current week milestones before changes
  const { schedule } = buildSchedule();
  preHolidayWeeks = schedule.map(s => s.calendarWeeks);
  calViewYear = yearStartDate.getFullYear();
  calViewMonth = yearStartDate.getMonth();
  renderHolidayModal();
}

function closeHolidayModal() {
  document.getElementById('modal-root').innerHTML = '';
  render(); // Recalculate timeline with updated holidays
  flashChangedWeeks();
}

function flashChangedWeeks() {
  if (!preHolidayWeeks || state.view !== 'year') { preHolidayWeeks = null; return; }
  const { schedule } = buildSchedule();
  const postWeeks = schedule.map(s => s.calendarWeeks);
  const segs = document.querySelectorAll('.day-ruler-seg');

  segs.forEach((seg, i) => {
    if (i < preHolidayWeeks.length && preHolidayWeeks[i] !== postWeeks[i]) {
      seg.classList.add('wk-changed');
      // Show the shift overlay
      const overlay = document.createElement('div');
      overlay.className = 'wk-shift';
      overlay.textContent = `Week ${preHolidayWeeks[i]} → Week ${postWeeks[i]}`;
      seg.style.position = 'relative';
      seg.appendChild(overlay);

      // Clean up after animation
      setTimeout(() => {
        seg.classList.remove('wk-changed');
        if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
      }, 2600);
    }
  });
  preHolidayWeeks = null;
}

function calPrev() { calViewMonth--; if(calViewMonth<0){calViewMonth=11;calViewYear--;} renderHolidayModal(); }
function calNext() { calViewMonth++; if(calViewMonth>11){calViewMonth=0;calViewYear++;} renderHolidayModal(); }

function toggleHoliday(key, isOtherMonth) {
  if (isOtherMonth) return;
  if (holidays.has(key)) holidays.delete(key);
  else holidays.add(key);
  renderHolidayModal();
}

function renderHolidayModal() {
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dows = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  // Build calendar grid
  const firstDay = new Date(calViewYear, calViewMonth, 1);
  const startDow = firstDay.getDay();
  const daysInMonth = new Date(calViewYear, calViewMonth + 1, 0).getDate();
  const prevMonthDays = new Date(calViewYear, calViewMonth, 0).getDate();

  let cells = '';
  // Day-of-week headers
  dows.forEach(d => { cells += `<div class="cal-dow">${d}</div>`; });

  // Previous month fill
  for (let i = startDow - 1; i >= 0; i--) {
    const day = prevMonthDays - i;
    cells += `<div class="cal-day other-month">${day}</div>`;
  }

  // Current month
  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(calViewYear, calViewMonth, d);
    const key = dateToKey(date);
    const dow = date.getDay();
    const isWeekend = dow === 0 || dow === 6;
    const isHoliday = holidays.has(key);
    let cls = 'cal-day';
    if (isHoliday) cls += ' holiday';
    else if (isWeekend) cls += ' weekend';
    cells += `<div class="${cls}" onclick="toggleHoliday('${key}', false)">${d}</div>`;
  }

  // Next month fill
  const totalCells = startDow + daysInMonth;
  const remaining = (7 - (totalCells % 7)) % 7;
  for (let d = 1; d <= remaining; d++) {
    cells += `<div class="cal-day other-month">${d}</div>`;
  }

  const html = `<div class="modal-overlay" onclick="if(event.target===this)closeHolidayModal()">
    <div class="modal">
      <div class="modal-header">
        <h3>Set Holidays</h3>
        <button class="modal-close" onclick="closeHolidayModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="cal-nav">
          <button class="cal-nav-btn" onclick="calPrev()">&larr;</button>
          <span class="cal-month">${months[calViewMonth]} ${calViewYear}</span>
          <button class="cal-nav-btn" onclick="calNext()">&rarr;</button>
        </div>
        <div class="cal-grid">${cells}</div>
        <div class="cal-legend">
          <div class="cal-legend-swatch"></div>
          <span>Click dates to mark as holidays (no school)</span>
        </div>
        <div class="holiday-count">${holidays.size} holiday${holidays.size !== 1 ? 's' : ''} selected</div>
      </div>
      <div class="modal-footer">
        <button class="modal-btn" onclick="holidays.clear();renderHolidayModal()">Clear all</button>
        <button class="modal-btn primary" onclick="closeHolidayModal()">Done</button>
      </div>
    </div>
  </div>`;
  document.getElementById('modal-root').innerHTML = html;
}
