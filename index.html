let modifyState = { daysRecovered: 0, lessonsRemaining: 0, maxRecoverable: 0, active: false };

function enableModify(unitId) {
  const unit = UNITS.find(u => u.id === unitId);
  if (!unit) return;

  modifyState.active = true;

  // Read current impact values
  const impactNums = document.querySelectorAll('.ai-plan-impact .impact-num');
  if (impactNums.length >= 2) {
    modifyState.daysRecovered = parseInt(impactNums[0].textContent) || 0;
    modifyState.lessonsRemaining = parseInt(impactNums[1].textContent) || 0;
  }

  // Compute max recoverable days based on lessons remaining
  const allNonOpt = [];
  unit.sections.forEach(s => s.lessons.forEach(l => { if (!l.optional) allNonOpt.push(l); }));
  const remainingLessons = allNonOpt.filter(l => !getCompleted(unit.id).has(l.id));
  const optSkippable = unit.optionalLessons.filter(id => !getCompleted(unit.id).has(id));
  const pairsAvail = findCombinablePairs(unit, remainingLessons);
  modifyState.maxRecoverable = optSkippable.length + pairsAvail.length;

  // ---- Insert assessment target toggle (only in Modify, only if unit has both) ----
  const midAssess = unit.assessments.find(a => a.type === 'formative');
  const endAssess = unit.assessments.find(a => a.type === 'summative');
  const hasBoth = midAssess && endAssess;
  const progressSection = document.querySelector('#aiPlanArea .perf-slider-section');
  if (hasBoth && progressSection) {
    const targetType = state.targetAssess || 'auto';
    const completedCount = allNonOpt.filter(l => getCompleted(unit.id).has(l.id)).length;
    const isMidTarget = (targetType === 'mid') || (targetType === 'auto' && midAssess && completedCount < midAssess.afterLesson);
    const isEndTarget = !isMidTarget;
    const toggleEl = document.createElement('div');
    toggleEl.id = 'assessTargetToggle';
    toggleEl.innerHTML = `<div style="display:flex;gap:0;margin-bottom:14px;border:1px solid var(--border);border-radius:6px;overflow:hidden">
      <button onclick="switchAssessTarget('mid')" style="flex:1;padding:8px 12px;font-size:12px;font-weight:600;border:none;cursor:pointer;font-family:'Lexend',sans-serif;transition:all .15s;${isMidTarget ? 'background:var(--black);color:#fff' : 'background:var(--white);color:var(--mid)'}">${midAssess.label}</button>
      <button onclick="switchAssessTarget('end')" style="flex:1;padding:8px 12px;font-size:12px;font-weight:600;border:none;border-left:1px solid var(--border);cursor:pointer;font-family:'Lexend',sans-serif;transition:all .15s;${isEndTarget ? 'background:var(--black);color:#fff' : 'background:var(--white);color:var(--mid)'}">${endAssess.label}</button>
    </div>
    <div style="font-size:11px;color:var(--mid);margin-bottom:12px;margin-top:-8px">Change assessment target to adjust your plan scope</div>`;
    progressSection.insertBefore(toggleEl, progressSection.firstChild);
  }

  // ---- Insert lesson completion checklist above the suggested plan ----

  // Build checklist
  const completed = getCompleted(unit.id);
  const allLessons = [];
  unit.sections.forEach(s => s.lessons.forEach(l => allLessons.push(l)));

  // Simulate auto-detection: in real product, Kiddom would pre-fill from assignment data.
  // For prototype, we pre-fill ~40% of lessons as "detected completed" to show the concept.
  const simulatedAutoDetect = new Set();
  const simCount = Math.floor(allLessons.filter(l => !l.optional).length * 0.4);
  allLessons.filter(l => !l.optional).slice(0, simCount).forEach(l => simulatedAutoDetect.add(l.id));
  // Merge with any manually completed
  completed.forEach(id => simulatedAutoDetect.add(id));

  let checklistHtml = `<div class="lesson-checklist" id="lessonChecklist">
    <div class="lesson-checklist-header">
      <div>
        <div class="lesson-checklist-title">Confirm lessons taught</div>
        <div class="lesson-checklist-subtitle">Pre-filled from assignment data. Adjust if needed.</div>
      </div>
      <div class="lesson-checklist-source">Auto-detected from Kiddom</div>
    </div>
    <div class="lesson-checklist-grid">`;

  allLessons.forEach(l => {
    const isChecked = simulatedAutoDetect.has(l.id);
    const isOpt = l.optional;
    if (isChecked && !completed.has(l.id)) {
      // Sync simulated completions to actual state for plan calculation
      completed.add(l.id);
    }
    checklistHtml += `<div class="lesson-check-row" onclick="toggleLessonCheck(${unitId},${l.id},this)">
      <div class="lc-box${isChecked ? ' checked' : ''}"></div>
      <span class="lc-name${isChecked ? ' completed-name' : ''}">Lesson ${l.id}: ${l.name}</span>
      ${isOpt ? '<span class="lc-tag opt">Optional</span>' : ''}
      ${isChecked ? '<span class="lc-tag auto">Detected</span>' : ''}
    </div>`;
  });

  checklistHtml += `</div>
    <div class="lesson-checklist-actions">
      <button onclick="checklistSelectAll(${unitId})">Select all</button>
      <button onclick="checklistClearAll(${unitId})">Clear all</button>
    </div>
  </div>`;

  // Insert checklist before the Suggested Plan label
  const planArea = document.getElementById('aiPlanArea');
  if (planArea) {
    // Find the "Suggested Plan" label and insert before it
    const allDivs = planArea.children;
    let insertBefore = null;
    for (let i = 0; i < allDivs.length; i++) {
      if (allDivs[i].textContent.trim() === 'Suggested Plan') {
        insertBefore = allDivs[i];
        break;
      }
    }
    const checklistContainer = document.createElement('div');
    checklistContainer.id = 'checklistContainer';
    checklistContainer.innerHTML = checklistHtml;
    if (insertBefore) {
      planArea.insertBefore(checklistContainer, insertBefore);
    } else {
      // Insert after the progress section
      const perfSection = planArea.querySelector('.perf-slider-section');
      if (perfSection && perfSection.nextSibling) {
        planArea.insertBefore(checklistContainer, perfSection.nextSibling);
      }
    }

    // Rebuild the plan with the updated completions
    rebuildPlanSteps(unitId);
  }

  // Insert editable impact section (only appears in Modify flow)
  const actionsEl = document.querySelector('.ai-plan-actions');
  if (actionsEl) {
    const impactEl = document.createElement('div');
    impactEl.className = 'ai-plan-impact editable';
    impactEl.innerHTML = `
      <div class="impact-item">
        <div class="impact-num editable" id="modDays">${modifyState.daysRecovered}</div>
        <div class="impact-label">Days lost</div>
        <div class="impact-stepper">
          <button onclick="modifyImpact('days',-1,${unitId})">-</button>
          <button onclick="modifyImpact('days',1,${unitId})">+</button>
        </div>
        <div style="font-size:10px;color:var(--mid);margin-top:2px">${modifyState.maxRecoverable} recoverable</div>
      </div>`;
    actionsEl.parentNode.insertBefore(impactEl, actionsEl);
    // Insert warning area after impact section
    const warningDiv = document.createElement('div');
    warningDiv.id = 'daysWarning';
    warningDiv.style.cssText = 'display:none;font-size:12px;color:var(--mid);padding:10px 14px;background:#FFF8E1;border:1px solid #FFE082;border-radius:6px;margin-top:8px;line-height:1.5';
    impactEl.parentNode.insertBefore(warningDiv, actionsEl);
  }

  // Make steps toggleable
  const steps = document.querySelectorAll('.ai-plan-step');
  steps.forEach(s => {
    s.classList.add('modifiable');
    if (!s.dataset.bound) {
      s.dataset.bound = 'true';
      s.addEventListener('click', function() {
        this.classList.toggle('excluded');
        recalcModifyImpact(unitId);
      });
    }
  });

  // Update button
  const modifyBtn = document.querySelector('.btn-adjust');
  if (modifyBtn) {
    modifyBtn.textContent = 'Reset';
    modifyBtn.onclick = function() { resetModify(unitId); };
  }

  // Add helper
  const actionsDiv = document.querySelector('.ai-plan-actions');
  if (actionsDiv && !document.getElementById('modifyHelper')) {
    const helper = document.createElement('div');
    helper.id = 'modifyHelper';
    helper.className = 'modify-helper';
    helper.textContent = 'Confirm which lessons are taught, then use +/- to adjust targets or click steps to exclude them.';
    actionsDiv.parentNode.insertBefore(helper, actionsDiv.nextSibling);
  }
}

function toggleLessonCheck(unitId, lessonId, row) {
  const box = row.querySelector('.lc-box');
  const name = row.querySelector('.lc-name');
  const completed = getCompleted(unitId);
  const autoTag = row.querySelector('.lc-tag.auto');

  if (box.classList.contains('checked')) {
    box.classList.remove('checked');
    name.classList.remove('completed-name');
    completed.delete(lessonId);
    if (autoTag) autoTag.remove();
  } else {
    box.classList.add('checked');
    name.classList.add('completed-name');
    completed.add(lessonId);
  }
  // Rebuild the plan with updated completions
  rebuildPlanSteps(unitId);
}

function checklistSelectAll(unitId) {
  const unit = UNITS.find(u => u.id === unitId);
  if (!unit) return;
  const completed = getCompleted(unitId);
  unit.sections.forEach(s => s.lessons.forEach(l => completed.add(l.id)));
  // Update all checkboxes
  document.querySelectorAll('.lesson-check-row').forEach(row => {
    row.querySelector('.lc-box').classList.add('checked');
    row.querySelector('.lc-name').classList.add('completed-name');
  });
  rebuildPlanSteps(unitId);
}

function checklistClearAll(unitId) {
  const completed = getCompleted(unitId);
  completed.clear();
  document.querySelectorAll('.lesson-check-row').forEach(row => {
    row.querySelector('.lc-box').classList.remove('checked');
    row.querySelector('.lc-name').classList.remove('completed-name');
  });
  rebuildPlanSteps(unitId);
}

function rebuildPlanSteps(unitId) {
  const unit = UNITS.find(u => u.id === unitId);
  if (!unit) return;

  // Rebuild just the steps + impact, preserving the checklist and progress section
  const completed = getCompleted(unitId);
  const allNonOptional = [];
  unit.sections.forEach(s => s.lessons.forEach(l => { if (!l.optional) allNonOptional.push(l); }));
  const remaining = allNonOptional.filter(l => !completed.has(l.id));
  const completedCount = allNonOptional.filter(l => completed.has(l.id)).length;

  // Update the progress display
  const progressSection = document.querySelector('#aiPlanArea .perf-slider-section');
  if (progressSection) {
    // Find and update the completed count text
    const progText = progressSection.querySelectorAll('div');
    progText.forEach(d => {
      if (d.textContent.includes('required lessons completed')) {
        // Determine scope
        const midAssess = unit.assessments.find(a => a.type === 'formative');
        const targetType = state.targetAssess || 'auto';
        const isMid = (targetType === 'mid') || (targetType === 'auto' && midAssess && completedCount < midAssess.afterLesson);

        let scopeTotal = allNonOptional.length;
        let scopeDone = completedCount;
        let scopeRemaining = remaining.length;
        if (isMid && midAssess) {
          const beforeMid = allNonOptional.filter(l => l.id <= midAssess.afterLesson);
          scopeTotal = beforeMid.length;
          scopeDone = beforeMid.filter(l => completed.has(l.id)).length;
          scopeRemaining = beforeMid.filter(l => !completed.has(l.id)).length;
        }
        d.textContent = `${scopeDone} of ${scopeTotal} required lessons completed`;
      }
    });
    // Update the big number
    const bigNum = progressSection.querySelector('div[style*="font-size:22px"], div[style*="font-size: 22px"]');
    if (bigNum) {
      const midAssess = unit.assessments.find(a => a.type === 'formative');
      const targetType = state.targetAssess || 'auto';
      const isMid = (targetType === 'mid') || (targetType === 'auto' && midAssess && completedCount < midAssess.afterLesson);
      let scopeRemaining = remaining.length;
      if (isMid && midAssess) {
        scopeRemaining = allNonOptional.filter(l => l.id <= midAssess.afterLesson && !completed.has(l.id)).length;
      }
      bigNum.textContent = scopeRemaining;
    }
    // Update progress bar
    const bar = progressSection.querySelector('div[style*="background:var(--black)"]');
    if (bar) {
      const midAssess = unit.assessments.find(a => a.type === 'formative');
      const targetType = state.targetAssess || 'auto';
      const isMid = (targetType === 'mid') || (targetType === 'auto' && midAssess && completedCount < midAssess.afterLesson);
      let scopeTotal = allNonOptional.length;
      let scopeDone = completedCount;
      if (isMid && midAssess) {
        const beforeMid = allNonOptional.filter(l => l.id <= midAssess.afterLesson);
        scopeTotal = beforeMid.length;
        scopeDone = beforeMid.filter(l => completed.has(l.id)).length;
      }
      bar.style.width = (scopeTotal > 0 ? Math.round((scopeDone / scopeTotal) * 100) : 0) + '%';
    }
  }

  // Update impact numbers
  const daysEl = document.getElementById('modDays');
  const lessonsEl = document.getElementById('modLessons');
  if (daysEl) {
    // Recalculate available recovery
    const optSkippable = unit.optionalLessons.filter(id => !completed.has(id));
    const pairs = findCombinablePairs(unit, remaining);
    modifyState.maxRecoverable = optSkippable.length + pairs.length;
    modifyState.daysRecovered = modifyState.maxRecoverable;
    daysEl.textContent = modifyState.daysRecovered;
    // Update the "X recoverable" hint
    const hintEl = daysEl.closest('.impact-item')?.querySelector('div[style*="font-size:10px"]');
    if (hintEl) hintEl.textContent = modifyState.maxRecoverable + ' recoverable';
  }
  if (lessonsEl) {
    modifyState.lessonsRemaining = remaining.length;
    lessonsEl.textContent = remaining.length;
  }

  // Re-render the suggested plan steps
  const planArea = document.getElementById('aiPlanArea');
  if (planArea) {
    // Remove existing step elements and "Suggested Plan" label
    const existingSteps = planArea.querySelectorAll('.ai-plan-step');
    existingSteps.forEach(s => s.remove());
    // Remove "Suggested Plan" label
    for (const child of [...planArea.children]) {
      if (child.textContent.trim() === 'Suggested Plan' && !child.classList) child.remove();
      if (child.tagName === 'DIV' && child.textContent.trim() === 'Suggested Plan' && !child.querySelector('.ai-plan-step')) child.remove();
    }

    // Regenerate steps from buildModePlan, extract just the step data
    const mode = state.aiMode || 'assessment';
    const freshPlan = buildModePlan(unit, mode);
    // Parse step HTML from freshPlan and insert before actions
    const tempDiv = document.createElement('div');
    tempDiv.innerHTML = freshPlan;
    const newSteps = tempDiv.querySelectorAll('.ai-plan-step');
    // Find the "Suggested Plan" label in the fresh HTML
    let newLabel = null;
    for (const child of tempDiv.children) {
      if (child.textContent.trim() === 'Suggested Plan' && !child.querySelector('.ai-plan-step')) {
        newLabel = child;
        break;
      }
    }

    const actionsEl = planArea.querySelector('.ai-plan-actions');
    if (actionsEl) {
      if (newLabel) planArea.insertBefore(newLabel, actionsEl);
      newSteps.forEach(step => {
        planArea.insertBefore(step, actionsEl);
        // Re-apply modifiable behavior if in modify mode
        if (modifyState.active) {
          step.classList.add('modifiable');
          step.addEventListener('click', function() {
            this.classList.toggle('excluded');
            recalcModifyImpact(unitId);
          });
        }
      });
    }
  }
}

function modifyImpact(type, delta, unitId) {
  const warningEl = document.getElementById('daysWarning');

  if (type === 'days') {
    const newVal = Math.max(0, modifyState.daysRecovered + delta);
    modifyState.daysRecovered = newVal;
    const el = document.getElementById('modDays');
    if (el) {
      el.textContent = newVal;
      // Visual feedback based on limits
      if (newVal > modifyState.maxRecoverable) {
        el.style.color = '#333';
      } else {
        el.style.color = '';
      }
    }
    // Warning messaging
    if (warningEl) {
      if (newVal > modifyState.maxRecoverable) {
        const over = newVal - modifyState.maxRecoverable;
        warningEl.innerHTML = `<span style="color:#333;font-weight:600">Exceeds recoverable days by ${over}.</span> This will require skipping required lessons or shortening activities, which may leave gaps in student understanding before the assessment.`;
        warningEl.style.display = 'block';
      } else if (newVal === modifyState.maxRecoverable) {
        warningEl.innerHTML = 'At the maximum recoverable days. All optional lessons skipped and available pairs combined.';
        warningEl.style.display = 'block';
      } else {
        warningEl.style.display = 'none';
      }
    }
  } else if (type === 'lessons') {
    modifyState.lessonsRemaining = Math.max(0, modifyState.lessonsRemaining + delta);
    const el = document.getElementById('modLessons');
    if (el) el.textContent = modifyState.lessonsRemaining;
  }
  // Update plan suggestions based on new targets
  updatePlanForTargets(unitId);
}

function updatePlanForTargets(unitId) {
  const unit = UNITS.find(u => u.id === unitId);
  if (!unit) return;

  const completed = getCompleted(unit.id);
  const allNonOptional = [];
  unit.sections.forEach(s => s.lessons.forEach(l => { if (!l.optional) allNonOptional.push(l); }));
  const remaining = allNonOptional.filter(l => !completed.has(l.id));

  const targetDays = modifyState.daysRecovered;
  const targetLessons = modifyState.lessonsRemaining;
  const lessonsToRemove = remaining.length - targetLessons;

  // Build a recommendation note
  let noteHtml = '';
  if (lessonsToRemove > 0 && targetDays > 0) {
    // Figure out how to hit both targets
    const optSkippable = unit.optionalLessons.filter(id => !completed.has(id));
    const pairsAvailable = findCombinablePairs(unit, remaining);
    const fromOpt = Math.min(optSkippable.length, targetDays);
    const fromCombine = Math.min(pairsAvailable.length, Math.max(0, targetDays - fromOpt));

    let recs = [];
    if (fromOpt > 0) {
      const optNames = optSkippable.slice(0, fromOpt).map(id => {
        let n = ''; unit.sections.forEach(s => s.lessons.forEach(l => { if (l.id === id) n = l.name; })); return `Lesson ${id}: ${n}`;
      });
      recs.push(`Skip ${fromOpt} optional: ${optNames.join(', ')}`);
    }
    if (fromCombine > 0) {
      const combNames = pairsAvailable.slice(0, fromCombine).map(p => `Lessons ${p.a.id}+${p.b.id}`);
      recs.push(`Combine ${fromCombine} pair${fromCombine > 1 ? 's' : ''}: ${combNames.join(', ')}`);
    }
    if (recs.length > 0) {
      noteHtml = `<div style="font-size:12px;color:var(--dark);background:#F8F8F8;border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;margin-top:10px;line-height:1.45">
        <strong>To reach your targets:</strong> ${recs.join('. ')}.
      </div>`;
    }
  }

  // Insert/update recommendation
  let noteEl = document.getElementById('modifyRec');
  if (noteHtml) {
    if (noteEl) {
      noteEl.innerHTML = noteHtml;
    } else {
      const impactEl = document.querySelector('.ai-plan-impact');
      if (impactEl) {
        const div = document.createElement('div');
        div.id = 'modifyRec';
        div.innerHTML = noteHtml;
        impactEl.parentNode.insertBefore(div, impactEl.nextSibling);
      }
    }
  } else if (noteEl) {
    noteEl.innerHTML = '';
  }
}

function recalcModifyImpact(unitId) {
  // Count excluded steps and adjust days
  const steps = document.querySelectorAll('.ai-plan-step');
  let excludedCount = 0;
  steps.forEach(s => { if (s.classList.contains('excluded')) excludedCount++; });

  // Simple heuristic: each excluded step roughly adjusts days by 1
  const unit = UNITS.find(u => u.id === unitId);
  if (!unit) return;
  const completed = getCompleted(unit.id);
  const allNonOptional = [];
  unit.sections.forEach(s => s.lessons.forEach(l => { if (!l.optional) allNonOptional.push(l); }));
  const remaining = allNonOptional.filter(l => !completed.has(l.id));

  // Recalc from original plan minus excluded
  const origDays = modifyState.daysRecovered;
  const adjustedDays = Math.max(0, origDays - excludedCount);
  const adjustedLessons = remaining.length - adjustedDays;

  const daysEl = document.getElementById('modDays');
  const lessonsEl = document.getElementById('modLessons');
  if (daysEl) daysEl.textContent = adjustedDays;
  if (lessonsEl) lessonsEl.textContent = Math.max(0, adjustedLessons);
}

function resetModify(unitId) {
  modifyState.active = false;
  const unit = UNITS.find(u => u.id === unitId);
  if (unit) {
    const planArea = document.getElementById('aiPlanArea');
    if (planArea) planArea.innerHTML = buildModePlan(unit, state.aiMode);
  }
}

function confirmPlan(unitId) {
  const unit = UNITS.find(u => u.id === unitId);
  if (!unit) { closeAIPanel(); return; }

  const mode = state.aiMode || 'assessment';
  const completed = getCompleted(unit.id);
  const allNonOptional = [];
  unit.sections.forEach(s => s.lessons.forEach(l => { if (!l.optional) allNonOptional.push(l); }));
  const remaining = allNonOptional.filter(l => !completed.has(l.id));

  // Build plan tags per lesson
  const planTags = {}; // lessonId -> {tag, tagClass, label}

  if (mode === 'assessment') {
    // Determine scoped remaining
    const midAssess = unit.assessments.find(a => a.type === 'formative');
    const targetType = state.targetAssess || 'auto';
    const completedCount = allNonOptional.filter(l => completed.has(l.id)).length;
    const isMid = (targetType === 'mid') || (targetType === 'auto' && midAssess && completedCount < midAssess.afterLesson);
    let scopedRemaining = remaining;
    if (isMid && midAssess) {
      scopedRemaining = allNonOptional.filter(l => l.id <= midAssess.afterLesson && !completed.has(l.id));
    }

    // Critical: lessons mapped to assessed standards
    const stdMap = buildStandardLessonMap(unit);
    const criticalIds = new Set();
    unit.standards.forEach(std => {
      (stdMap[std] || []).forEach(id => {
        if (scopedRemaining.find(l => l.id === id)) criticalIds.add(id);
      });
    });
    criticalIds.forEach(id => { planTags[id] = {tag: 'keep', tagClass: 'tag-keep', label: 'Keep'}; });

    // Skip: optional lessons
    unit.optionalLessons.filter(id => !completed.has(id)).forEach(id => {
      planTags[id] = {tag: 'skip', tagClass: 'tag-skip', label: 'Skip'};
    });

    // Combine: lesson pairs
    const pairs = findCombinablePairs(unit, scopedRemaining);
    pairs.forEach(p => {
      planTags[p.a.id] = {tag: 'combine', tagClass: 'tag-combine', label: 'Combine'};
      planTags[p.b.id] = {tag: 'combine', tagClass: 'tag-combine', label: 'Combine'};
    });

    // Store pair data for lesson-level combined plans
    if (!state.confirmedPairs) state.confirmedPairs = {};
    state.confirmedPairs[unitId] = pairs.map(p => ({ a: p.a.id, b: p.b.id, lessonA: p.a, lessonB: p.b }));

  } else {
    // Class Performance mode
    const perfVal = state.perfSlider || 50;
    const tier = getPerformanceTier(perfVal);

    if (tier === 'developing') {
      // Keep all at depth, skip optional for reteach room
      remaining.forEach(l => { planTags[l.id] = {tag: 'keep', tagClass: 'tag-keep', label: 'Keep'}; });
      unit.optionalLessons.filter(id => !completed.has(id)).forEach(id => {
        planTags[id] = {tag: 'skip', tagClass: 'tag-skip', label: 'Skip'};
      });
    } else if (tier === 'approaching') {
      // Reinforce key lessons
      const priority = findHighPriorityLessons(unit, remaining);
      priority.slice(0, 4).forEach(p => {
        planTags[p.lesson.id] = {tag: 'reinforce', tagClass: 'tag-keep', label: 'Reinforce'};
      });
    } else if (tier === 'mastery') {
      // On track, no special tags
    } else {
      // Exceeds: combine and skip
      const pairs = findCombinablePairs(unit, remaining);
      pairs.forEach(p => {
        planTags[p.a.id] = {tag: 'combine', tagClass: 'tag-combine', label: 'Combine'};
        planTags[p.b.id] = {tag: 'combine', tagClass: 'tag-combine', label: 'Combine'};
      });
      unit.optionalLessons.filter(id => !completed.has(id)).forEach(id => {
        planTags[id] = {tag: 'skip', tagClass: 'tag-skip', label: 'Skip'};
      });

      // Store pair data for lesson-level combined plans
      if (!state.confirmedPairs) state.confirmedPairs = {};
      if (!state.confirmedPairs[unitId]) state.confirmedPairs[unitId] = [];
      state.confirmedPairs[unitId] = pairs.map(p => ({ a: p.a.id, b: p.b.id, lessonA: p.a, lessonB: p.b }));
    }
  }

  // Store confirmed plan in state
  if (!state.confirmedPlans) state.confirmedPlans = {};
  state.confirmedPlans[unitId] = planTags;

  closeAIPanel();
  render();

  // Show confirmation notification
  const notification = document.createElement('div');
  notification.style.cssText = 'position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--black);color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:600;font-family:Lexend,sans-serif;z-index:500;box-shadow:0 4px 16px rgba(0,0,0,.25);animation:slideUp .3s ease';
  notification.textContent = `Plan confirmed for Unit ${unitId}. Lesson tags updated.`;
  document.body.appendChild(notification);
  setTimeout(() => { if (notification.parentNode) notification.parentNode.removeChild(notification); }, 3000);
}

function getPlanTag(unitId, lessonId) {
  if (state.confirmedPlans && state.confirmedPlans[unitId]) {
    return state.confirmedPlans[unitId][lessonId] || null;
  }
  return null;
}

// Build a combined lesson plan showing which activities to keep, compress, or skip
function buildCombinedPlan(lessonA, lessonB, unitId) {
  const dataA = LESSON_ACTIVITY_DATA[unitId + '-' + lessonA.id];
  const dataB = LESSON_ACTIVITY_DATA[unitId + '-' + lessonB.id];
  if (!dataA || !dataB) return null;

  const plan = [];

  // Categorize activities
  const warmupA = dataA.activities.find(a => a.label === 'Warm-Up');
  const warmupB = dataB.activities.find(a => a.label === 'Warm-Up');
  const synthA = dataA.activities.find(a => a.label === 'Lesson Synthesis');
  const synthB = dataB.activities.find(a => a.label === 'Lesson Synthesis');
  const coreA = dataA.activities.filter(a => a.label !== 'Warm-Up' && a.label !== 'Lesson Synthesis' && a.label !== 'Cool-Down');
  const coreB = dataB.activities.filter(a => a.label !== 'Warm-Up' && a.label !== 'Lesson Synthesis' && a.label !== 'Cool-Down');

  // Warm-ups: check if same routine
  const sameWarmupRoutine = warmupA && warmupB &&
    (warmupA.title.split(':')[0] === warmupB.title.split(':')[0]);

  if (warmupA) {
    plan.push({
      ...warmupA, lesson: lessonA.id, action: 'keep',
      reason: sameWarmupRoutine ? 'Same routine as L' + lessonB.id + ', keep this one' : 'Different routine, keep'
    });
  }
  if (warmupB) {
    if (sameWarmupRoutine) {
      plan.push({
        ...warmupB, lesson: lessonB.id, action: 'skip',
        reason: 'Same routine as L' + lessonA.id + ' warm-up, skip to recover time'
      });
    } else {
      // Different routine - check if it introduces a new year-long routine
      const introducesRoutine = warmupB.title.toLowerCase().includes('introduction');
      plan.push({
        ...warmupB, lesson: lessonB.id, action: introducesRoutine ? 'keep' : 'compress',
        time: introducesRoutine ? warmupB.time : Math.max(5, parseInt(warmupB.time) - 5) + ' min',
        reason: introducesRoutine ? 'Introduces a new routine, keep at full length' : 'Compress to save time'
      });
    }
  }

  // Core activities from lesson A
  coreA.forEach(a => {
    const isCenters = a.title.toLowerCase().includes('centers: choice time');
    if (isCenters) {
      plan.push({
        ...a, lesson: lessonA.id, action: 'skip',
        reason: 'Centers from both lessons merged into one shorter block below'
      });
    } else {
      plan.push({
        ...a, lesson: lessonA.id, action: 'keep',
        reason: 'Core activity, keep at full length'
      });
    }
  });

  // Core activities from lesson B
  coreB.forEach(a => {
    const isCenters = a.title.toLowerCase().includes('centers: choice time');
    if (isCenters) {
      // Check if lesson A also had centers
      const centersInA = coreA.some(x => x.title.toLowerCase().includes('centers: choice time'));
      if (centersInA) {
        plan.push({
          ...a, lesson: lessonB.id, action: 'compress',
          time: '10 min',
          reason: 'Merged centers from both lessons into a shorter block'
        });
      } else {
        plan.push({
          ...a, lesson: lessonB.id, action: 'compress',
          time: '10 min',
          reason: 'Shorten centers to make room for combined lesson'
        });
      }
    } else {
      // Check if same routine as an activity in A (e.g. both "How Many Do You See")
      const sameRoutineInA = coreA.find(x => x.title.split(':')[0] === a.title.split(':')[0]);
      if (sameRoutineInA) {
        plan.push({
          ...a, lesson: lessonB.id, action: 'keep',
          reason: 'Builds on L' + lessonA.id + '\'s ' + sameRoutineInA.title.split(':')[0] + ', keep for progression'
        });
      } else {
        plan.push({
          ...a, lesson: lessonB.id, action: 'keep',
          reason: 'Core activity, keep at full length'
        });
      }
    }
  });

  // Synthesis: merge into one
  if (synthA && synthB) {
    plan.push({
      label: 'Lesson Synthesis', title: 'Combined Synthesis',
      time: '5 min', grouping: 'Whole Class',
      desc: (synthA.desc || '') + ' ' + (synthB.desc || ''),
      lesson: 'combined', action: 'compress',
      reason: 'Merged synthesis from both lessons into one reflection'
    });
  } else if (synthA || synthB) {
    const synth = synthA || synthB;
    plan.push({
      ...synth, lesson: synthA ? lessonA.id : lessonB.id, action: 'keep',
      reason: 'Single synthesis, keep'
    });
  }

  // Enforce time budget: ~60 min per instructional day
  const TIME_BUDGET = 60;

  function getActiveTime() {
    return plan.reduce((sum, a) => a.action === 'skip' ? sum : sum + (parseInt(a.time) || 0), 0);
  }

  // Pass 1: If over budget, compress the second warm-up (if both kept)
  if (getActiveTime() > TIME_BUDGET) {
    const keptWarmups = plan.filter(a => a.label === 'Warm-Up' && a.action !== 'skip');
    if (keptWarmups.length > 1) {
      // Skip the second warm-up unless it introduces a new routine
      const second = keptWarmups[1];
      if (!second.reason?.includes('Introduces a new routine')) {
        second.action = 'skip';
        second.reason = 'Skipped to fit combined lesson within one day';
      } else {
        // Compress it instead
        second.action = 'compress';
        second.time = '5 min';
        second.reason = 'Compressed to fit within one day';
      }
    }
  }

  // Pass 2: If still over, compress all kept activities from lesson B
  if (getActiveTime() > TIME_BUDGET) {
    plan.forEach(a => {
      if (a.action === 'keep' && a.lesson === lessonB.id && a.label !== 'Warm-Up') {
        const origTime = parseInt(a.time) || 10;
        a.action = 'compress';
        a.time = Math.max(5, Math.floor(origTime * 0.6)) + ' min';
        a.reason = 'Compressed to fit combined lesson within one day';
      }
    });
  }

  // Pass 3: If still over, skip lowest-priority activities (centers, extras) from lesson B
  if (getActiveTime() > TIME_BUDGET) {
    const bActivities = plan.filter(a => a.lesson === lessonB.id && a.action !== 'skip' && a.label !== 'Warm-Up');
    // Skip from the end (lowest priority)
    for (let i = bActivities.length - 1; i >= 0 && getActiveTime() > TIME_BUDGET; i--) {
      bActivities[i].action = 'skip';
      bActivities[i].reason = 'Skipped to fit combined lesson within one day';
    }
  }

  // Pass 4: Last resort, compress lesson A activities
  if (getActiveTime() > TIME_BUDGET) {
    plan.forEach(a => {
      if (a.action === 'keep' && a.lesson === lessonA.id) {
        const origTime = parseInt(a.time) || 10;
        a.action = 'compress';
        a.time = Math.max(5, Math.floor(origTime * 0.7)) + ' min';
        a.reason = 'Compressed to fit combined lesson within one day';
      }
    });
  }

  const totalTime = getActiveTime();
  return { activities: plan, totalTime };
}

// Get the combine partner for a lesson
function getCombinePartner(unitId, lessonId) {
  if (!state.confirmedPairs || !state.confirmedPairs[unitId]) return null;
  const pairs = state.confirmedPairs[unitId];
  for (const p of pairs) {
    if (p.a === lessonId) return { partner: p.b, isFirst: true };
    if (p.b === lessonId) return { partner: p.a, isFirst: false };
  }
  return null;
}

// ---- Holiday Calendar Modal ----
let preHolidayWeeks = null; // Snapshot of week milestones before opening modal
let calViewYear = 2025;
let calViewMonth = 7; // Aug (0-indexed)

function openHolidayModal() {
  // Snapshot current week milestones before changes
  const { schedule } = buildSchedule();
  preHolidayWeeks = schedule.map(s => s.calendarWeeks);
  calViewYear = yearStartDate.getFullYear();
  calViewMonth = yearStartDate.getMonth();
  renderHolidayModal();
}

function closeHolidayModal() {
  document.getElementById('modal-root').innerHTML = '';
  render(); // Recalculate timeline with updated holidays
  flashChangedWeeks();
}

function flashChangedWeeks() {
  if (!preHolidayWeeks || state.view !== 'year') { preHolidayWeeks = null; return; }
  const { schedule } = buildSchedule();
  const postWeeks = schedule.map(s => s.calendarWeeks);
  const segs = document.querySelectorAll('.day-ruler-seg');

  segs.forEach((seg, i) => {
    if (i < preHolidayWeeks.length && preHolidayWeeks[i] !== postWeeks[i]) {
      seg.classList.add('wk-changed');
      // Show the shift overlay
      const overlay = document.createElement('div');
      overlay.className = 'wk-shift';
      overlay.textContent = `Week ${preHolidayWeeks[i]} → Week ${postWeeks[i]}`;
      seg.style.position = 'relative';
      seg.appendChild(overlay);

      // Clean up after animation
      setTimeout(() => {
        seg.classList.remove('wk-changed');
        if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
      }, 2600);
    }
  });
  preHolidayWeeks = null;
}

function calPrev() { calViewMonth--; if(calViewMonth<0){calViewMonth=11;calViewYear--;} renderHolidayModal(); }
function calNext() { calViewMonth++; if(calViewMonth>11){calViewMonth=0;calViewYear++;} renderHolidayModal(); }

function toggleHoliday(key, isOtherMonth) {
  if (isOtherMonth) return;
  if (holidays.has(key)) holidays.delete(key);
  else holidays.add(key);
  renderHolidayModal();
}

function renderHolidayModal() {
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dows = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  // Build calendar grid
  const firstDay = new Date(calViewYear, calViewMonth, 1);
  const startDow = firstDay.getDay();
  const daysInMonth = new Date(calViewYear, calViewMonth + 1, 0).getDate();
  const prevMonthDays = new Date(calViewYear, calViewMonth, 0).getDate();

  let cells = '';
  // Day-of-week headers
  dows.forEach(d => { cells += `<div class="cal-dow">${d}</div>`; });

  // Previous month fill
  for (let i = startDow - 1; i >= 0; i--) {
    const day = prevMonthDays - i;
    cells += `<div class="cal-day other-month">${day}</div>`;
  }

  // Current month
  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(calViewYear, calViewMonth, d);
    const key = dateToKey(date);
    const dow = date.getDay();
    const isWeekend = dow === 0 || dow === 6;
    const isHoliday = holidays.has(key);
    let cls = 'cal-day';
    if (isHoliday) cls += ' holiday';
    else if (isWeekend) cls += ' weekend';
    cells += `<div class="${cls}" onclick="toggleHoliday('${key}', false)">${d}</div>`;
  }

  // Next month fill
  const totalCells = startDow + daysInMonth;
  const remaining = (7 - (totalCells % 7)) % 7;
  for (let d = 1; d <= remaining; d++) {
    cells += `<div class="cal-day other-month">${d}</div>`;
  }

  const html = `<div class="modal-overlay" onclick="if(event.target===this)closeHolidayModal()">
    <div class="modal">
      <div class="modal-header">
        <h3>Set Holidays</h3>
        <button class="modal-close" onclick="closeHolidayModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="cal-nav">
          <button class="cal-nav-btn" onclick="calPrev()">&larr;</button>
          <span class="cal-month">${months[calViewMonth]} ${calViewYear}</span>
          <button class="cal-nav-btn" onclick="calNext()">&rarr;</button>
        </div>
        <div class="cal-grid">${cells}</div>
        <div class="cal-legend">
          <div class="cal-legend-swatch"></div>
          <span>Click dates to mark as holidays (no school)</span>
        </div>
        <div class="holiday-count">${holidays.size} holiday${holidays.size !== 1 ? 's' : ''} selected</div>
      </div>
      <div class="modal-footer">
        <button class="modal-btn" onclick="holidays.clear();renderHolidayModal()">Clear all</button>
        <button class="modal-btn primary" onclick="closeHolidayModal()">Done</button>
      </div>
    </div>
  </div>`;
  document.getElementById('modal-root').innerHTML = html;
}

    yearStartDate = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));

  if (endVal) {
