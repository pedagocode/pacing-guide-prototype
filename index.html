<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiddom - IM v.360 Math K</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --black:#111;--dark:#333;--mid:#666;--light:#999;--border:#D0D0D0;--bg:#F5F5F5;--white:#fff;
    --shadow:0 2px 8px rgba(0,0,0,.08);--shadow-lg:0 8px 24px rgba(0,0,0,.12);
    --radius:10px;--radius-sm:6px;--transition:0.3s cubic-bezier(.4,0,.2,1);
  }
  body{font-family:'Lexend',sans-serif;background:var(--bg);color:var(--black);min-height:100vh;overflow-x:hidden}

  /* Header */
  .header{background:var(--black);color:#fff;padding:16px 32px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
  .header-logo{font-weight:700;font-size:20px;letter-spacing:-.3px}
  .header-divider{width:1px;height:24px;background:rgba(255,255,255,.2)}
  .header-curriculum{font-size:14px;color:rgba(255,255,255,.7)}
  .header-right{margin-left:auto;display:flex;align-items:center;gap:16px}
  .header-day{background:rgba(255,255,255,.15);padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500}
  .breadcrumb{padding:12px 32px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:13px}
  .breadcrumb a{color:var(--mid);text-decoration:none;cursor:pointer}
  .breadcrumb a:hover{color:var(--black)}
  .breadcrumb .sep{color:#CCC}
  .breadcrumb .current{color:var(--black);font-weight:600}

  /* Container */
  .container{max-width:1200px;margin:0 auto;padding:24px 32px}

  /* Year View */
  .year-view{animation:fadeIn .35s ease}
  .year-title{font-size:26px;font-weight:700;margin-bottom:4px}
  .year-subtitle{font-size:14px;color:var(--mid);margin-bottom:24px}

  .timeline-wrapper{position:relative;margin-bottom:8px}
  .timeline{display:flex;gap:2px;height:88px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
  .timeline-unit{position:relative;cursor:pointer;display:flex;flex-direction:column;align-items:center;
    justify-content:center;background:var(--white);color:var(--black);transition:var(--transition);overflow:hidden;
    border-right:1px solid var(--border)}
  .timeline-unit:last-child{border-right:none}
  .timeline-unit:hover{background:#F0F0F0}
  .timeline-unit.selected{background:var(--black);color:var(--white)}
  .timeline-unit.selected:hover{background:#333}
  .timeline-unit.selected .unit-num,.timeline-unit.selected .unit-days{opacity:.7}
  .timeline-unit .unit-num{font-size:10px;font-weight:700;opacity:.5;text-transform:uppercase;letter-spacing:.5px}
  .timeline-unit .unit-short{font-size:10px;font-weight:600;line-height:1.25;text-align:center;
    max-width:95%;word-wrap:break-word;overflow-wrap:break-word}
  .timeline-unit .unit-days{font-size:10px;opacity:.5;margin-top:2px}

  /* Day ruler */
  .day-ruler{display:flex;gap:2px;height:22px;font-size:10px;color:var(--mid)}
  .day-ruler-seg{display:flex;align-items:center;justify-content:flex-end;padding-right:4px;
    border-right:1px solid var(--border);font-weight:500;position:relative;transition:background .3s ease}
  .day-ruler-seg:last-child{border-right:none}
  .day-ruler-seg.wk-changed{animation:wkFlash 2.5s ease}
  .day-ruler-seg .wk-shift{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:9px;font-weight:700;color:var(--black);background:#E8E8E8;border-radius:3px;
    animation:wkShiftFade 2.5s ease forwards;pointer-events:none}
  @keyframes wkFlash{0%{background:#E8E8E8}40%{background:#E8E8E8}100%{background:transparent}}
  @keyframes wkShiftFade{0%{opacity:1}60%{opacity:1}100%{opacity:0}}

  /* Curriculum Overview + Pacing Intelligence panel */
  .overview-panel{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);
    padding:20px 24px;margin-top:20px;box-shadow:var(--shadow);display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start}
  .overview-lbl{font-size:9px;font-weight:800;color:var(--light);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
  .overview-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #EEE}
  .overview-row:last-child{border-bottom:none}
  .overview-dot{width:9px;height:9px;border-radius:50%;background:var(--black);flex-shrink:0}
  .overview-name{flex:1;font-size:12px;color:var(--black)}
  .overview-meta{font-size:11px;color:var(--light);white-space:nowrap}
  .pacing-intel{background:#F8F8F8;border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px}
  .pacing-intel-title{font-size:12px;font-weight:700;color:var(--black);margin-bottom:10px}
  .pacing-intel-list{list-style:none;display:flex;flex-direction:column;gap:6px}
  .pacing-intel-list li{font-size:12px;color:var(--dark);padding-left:14px;position:relative;line-height:1.5}
  .pacing-intel-list li::before{content:'';position:absolute;left:0;top:7px;width:5px;height:5px;border-radius:50%;background:var(--black)}

  /* Unit View */
  .unit-view{animation:fadeIn .35s ease}

  /* Peek blocks */
  .peek-nav{display:flex;justify-content:space-between;margin-bottom:20px;gap:12px}
  .peek-block{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--white);
    border-radius:var(--radius);cursor:pointer;border:1px solid var(--border);transition:var(--transition);font-size:13px;color:var(--mid)}
  .peek-block:hover{border-color:var(--black);color:var(--black);box-shadow:var(--shadow)}
  .peek-block .peek-label{font-weight:600;color:var(--black)}
  .peek-block .peek-name{font-size:12px}
  .peek-placeholder{visibility:hidden}

  /* Hero tabs */
  .hero-tabs{display:flex;gap:0;margin-bottom:0;border-bottom:1px solid var(--border);background:var(--white);border-radius:var(--radius) var(--radius) 0 0;overflow:hidden}
  .hero-tab{flex:1;padding:12px 16px;font-size:13px;font-weight:600;text-align:center;cursor:pointer;
    background:var(--white);border:none;border-bottom:2px solid transparent;color:var(--mid);
    transition:var(--transition);font-family:'Lexend',sans-serif}
  .hero-tab:hover{background:#F8F8F8;color:var(--black)}
  .hero-tab.active{color:var(--black);border-bottom-color:var(--black);background:var(--white)}
  .hero-tab-label{font-size:9px;font-weight:400;color:var(--light);display:block;margin-top:2px}

  /* Hero dashboard */
  .hero-dashboard{background:var(--white);border-radius:0 0 var(--radius) var(--radius);padding:24px 28px;margin-bottom:24px;
    box-shadow:var(--shadow);border:1px solid var(--border);border-top:none}
  .hero-layout-row{display:flex;gap:32px;align-items:flex-start}
  .hero-left{display:flex;flex-direction:column;align-items:center;min-width:180px}
  .hero-label{font-size:13px;color:var(--mid);font-weight:500;margin-bottom:12px;text-align:center}
  .progress-ring{position:relative;width:120px;height:120px;margin:12px 0}
  .progress-ring svg{transform:rotate(-90deg)}
  .progress-ring circle{fill:none;stroke-width:10}
  .progress-ring .ring-bg{stroke:#E0E0E0}
  .progress-ring .ring-fg{stroke:#000;stroke-linecap:round;transition:stroke-dashoffset .8s ease}
  .progress-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:22px;font-weight:700}
  .hero-unit-label{margin-top:8px;font-size:12px;color:var(--mid)}

  .hero-right{flex:1}
  .hero-right h3{font-size:15px;font-weight:700;margin-bottom:12px}
  .gap-grid{display:flex;flex-wrap:wrap;gap:8px}
  .standard-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;
    font-size:12px;font-weight:600;cursor:default;transition:var(--transition)}
  .standard-pill.covered{background:#E8E8E8;color:var(--black);border:1px solid var(--dark)}
  .standard-pill.covered::before{content:'';display:block;width:8px;height:8px;border-radius:50%;background:var(--black)}
  .standard-pill.uncovered{background:var(--white);color:var(--light);border:1px solid var(--border)}
  .standard-pill.uncovered::before{content:'';display:block;width:8px;height:8px;border-radius:50%;background:var(--border)}
  .hero-footer{margin-top:14px;font-size:12px;color:var(--mid)}

  /* Hero 2: horizontal bar chart */
  .bar-chart{display:flex;flex-direction:column;gap:10px;margin-top:12px}
  .bar-row{display:flex;align-items:center;gap:10px}
  .bar-label{font-size:12px;font-weight:600;min-width:90px;text-align:right}
  .bar-track{flex:1;height:20px;background:#F0F0F0;border-radius:4px;overflow:hidden;border:1px solid var(--border)}
  .bar-fill{height:100%;background:var(--black);border-radius:4px 0 0 4px;transition:width .6s ease}
  .bar-value{font-size:11px;font-weight:600;min-width:36px}

  /* Hero 3: checklist */
  .checklist{list-style:none;display:flex;flex-direction:column;gap:8px;margin-top:12px}
  .checklist-item{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:#F8F8F8;border-radius:var(--radius-sm);border:1px solid var(--border)}
  .checklist-box{width:18px;height:18px;border:2px solid var(--border);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px}
  .checklist-box.checked{background:var(--black);border-color:var(--black)}
  .checklist-box.checked::after{content:'';display:block;width:5px;height:9px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);margin-top:-2px}
  .checklist-text{flex:1}
  .checklist-std{font-size:13px;font-weight:600}
  .checklist-detail{font-size:11px;color:var(--mid);margin-top:2px}
  .checklist-status{font-size:11px;font-weight:600;white-space:nowrap;margin-top:2px}

  /* Section + Lesson cards */
  .section-group{margin-bottom:28px}
  .section-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .section-letter{font-weight:700;font-size:14px;color:var(--black)}
  .section-name{font-size:15px;font-weight:600}

  .lessons-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
  .lesson-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-sm);
    padding:14px 16px;cursor:pointer;transition:var(--transition);position:relative}
  .lesson-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--dark)}
  .lesson-card.optional{border-style:dashed;opacity:.7}
  .lesson-card.optional .opt-badge{display:inline-block;font-size:10px;background:#F0F0F0;color:var(--dark);
    padding:2px 6px;border-radius:4px;font-weight:600;margin-top:6px}
  .plan-badge{display:inline-block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;
    padding:2px 8px;border-radius:4px;margin-top:6px}
  .plan-badge.tag-keep{background:var(--black);color:#fff}
  .plan-badge.tag-skip{background:#F0F0F0;color:var(--mid);text-decoration:line-through}
  .plan-badge.tag-combine{background:#E8E8E8;color:var(--dark)}
  .lesson-card.plan-skip{opacity:.5}
  .lesson-card.plan-combine{border-left:3px solid #999}
  .lesson-card.plan-keep{border-left:3px solid var(--black)}
  .lesson-card.plan-reinforce{border-left:3px solid var(--black)}
  .plan-badge-inline{display:inline-block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;
    padding:1px 6px;border-radius:3px;vertical-align:middle}
  .plan-badge-inline.tag-keep{background:var(--black);color:#fff}
  .plan-badge-inline.tag-skip{background:#F0F0F0;color:var(--mid)}
  .plan-badge-inline.tag-combine{background:#E8E8E8;color:var(--dark)}

  /* Combined lesson plan styles */
  .combined-plan-section{margin-top:32px;padding:24px;border-radius:var(--radius);background:#FAFAFA;border:1px solid var(--border)}
  .combined-plan-header{display:flex;align-items:center;gap:8px;margin-bottom:16px}
  .combined-plan-header h3{font-size:15px;font-weight:700;margin:0}
  .combined-plan-meta{font-size:12px;color:var(--mid);margin-bottom:20px}
  .cp-activity{padding:12px 16px;border-radius:8px;margin-bottom:8px;position:relative}
  .cp-activity.cp-keep{background:#fff;border:1px solid var(--border);border-left:3px solid var(--black)}
  .cp-activity.cp-compress{background:#fff;border:1px solid #E0D8B0;border-left:3px solid #BBA800}
  .cp-activity.cp-skip{background:#F8F8F8;border:1px solid #EAEAEA;opacity:.55}
  .cp-activity-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
  .cp-activity-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--mid)}
  .cp-activity-action{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;padding:2px 8px;border-radius:4px}
  .cp-action-keep{background:var(--black);color:#fff}
  .cp-action-compress{background:#FFF8E1;color:#8B7800;border:1px solid #E0D8B0}
  .cp-action-skip{background:#F0F0F0;color:var(--mid);text-decoration:line-through}
  .cp-activity-title{font-size:13px;font-weight:600;margin-bottom:2px}
  .cp-activity-time{font-size:11px;color:var(--mid)}
  .cp-activity-reason{font-size:11px;color:var(--mid);font-style:italic;margin-top:4px}
  .cp-activity-source{font-size:10px;color:var(--border);margin-top:2px}
  .cp-time-savings{display:flex;align-items:center;gap:8px;padding:12px 16px;border-radius:8px;background:var(--black);color:#fff;font-size:13px;font-weight:600;margin-top:12px}
  .lesson-card.completed{border-left:3px solid var(--black)}
  .lesson-card .lesson-num{font-size:11px;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:.3px}
  .lesson-card .lesson-name{font-size:13px;font-weight:600;margin-top:4px;line-height:1.35}
  .lesson-card .assess-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:4px;
    font-weight:600;margin-top:6px}
  .lesson-card .assess-badge.formative{background:#F0F0F0;color:var(--dark)}
  .lesson-card .assess-badge.summative{background:var(--black);color:#fff}

  /* Kiddom link */
  .kiddom-link{display:block;font-size:10px;font-weight:600;color:var(--mid);margin-top:6px;
    text-decoration:none;transition:color .15s}
  .kiddom-link:hover{color:var(--black);text-decoration:underline}

  /* Assessment blocks (standalone) */
  .assess-block{background:var(--white);border:2px solid var(--black);border-radius:var(--radius-sm);
    padding:14px 16px;position:relative;text-align:center}
  .assess-block .assess-type{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--mid)}
  .assess-block .assess-name{font-size:13px;font-weight:700;margin-top:4px}
  .assess-block .assess-day{font-size:11px;color:var(--mid);margin-top:4px}
  .assess-block.summative{background:var(--black);color:#fff}
  .assess-block.summative .assess-type{color:rgba(255,255,255,.6)}
  .assess-block.summative .assess-day{color:rgba(255,255,255,.6)}

  /* Adjust pacing button */
  .adjust-pacing-btn{position:fixed;bottom:28px;right:28px;background:var(--black);color:#fff;border:none;
    padding:10px 18px;border-radius:24px;font-size:13px;font-weight:600;cursor:pointer;
    box-shadow:0 4px 16px rgba(0,0,0,.25);transition:var(--transition);z-index:50;
    display:flex;align-items:center;gap:6px;font-family:'Lexend',sans-serif}
  .adjust-pacing-btn:hover{background:var(--dark);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.35)}
  .adjust-pacing-btn svg{width:16px;height:16px}
  .adjust-pacing-btn.pulsing svg{animation:boltBlink 1.5s ease-in-out infinite}
  @keyframes boltBlink{0%{opacity:1}50%{opacity:.3}100%{opacity:1}}

  /* Mode selector in AI panel */
  .mode-selector{display:flex;gap:0;margin-bottom:20px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
  .mode-option{flex:1;padding:14px 16px;cursor:pointer;background:var(--white);border:none;
    font-family:'Lexend',sans-serif;font-size:13px;font-weight:500;color:var(--mid);
    transition:var(--transition);text-align:left;border-right:1px solid var(--border)}
  .mode-option:last-child{border-right:none}
  .mode-option:hover{background:#F8F8F8;color:var(--black)}
  .mode-option.active{background:var(--black);color:#fff}
  .mode-option .mode-title{font-weight:700;font-size:13px;display:block}
  .mode-option .mode-desc{font-size:11px;opacity:.7;margin-top:2px;display:block;line-height:1.35}

  /* Lesson checklist in modify mode */
  .lesson-checklist{background:#F8F8F8;border:1px solid var(--border);border-radius:var(--radius);
    padding:16px 18px;margin-bottom:20px}
  .lesson-checklist-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .lesson-checklist-title{font-size:13px;font-weight:700}
  .lesson-checklist-subtitle{font-size:11px;color:var(--mid)}
  .lesson-checklist-source{font-size:10px;color:var(--light);font-style:italic}
  .lesson-checklist-grid{display:flex;flex-direction:column;gap:2px;max-height:200px;overflow-y:auto}
  .lesson-check-row{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:4px;
    cursor:pointer;transition:background .1s;font-size:12px}
  .lesson-check-row:hover{background:#EFEFEF}
  .lesson-check-row .lc-box{width:16px;height:16px;border:2px solid var(--border);border-radius:3px;
    flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
  .lesson-check-row .lc-box.checked{background:var(--black);border-color:var(--black)}
  .lesson-check-row .lc-box.checked::after{content:'';display:block;width:4px;height:8px;
    border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);margin-top:-2px}
  .lesson-check-row .lc-name{flex:1;color:var(--dark)}
  .lesson-check-row .lc-name.completed-name{color:var(--black);font-weight:600}
  .lesson-check-row .lc-tag{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:600}
  .lesson-check-row .lc-tag.opt{background:#F0F0F0;color:var(--mid)}
  .lesson-check-row .lc-tag.auto{background:#E8E8E8;color:var(--dark)}
  .lesson-checklist-actions{display:flex;gap:8px;margin-top:10px}
  .lesson-checklist-actions button{font-size:11px;font-weight:600;padding:4px 10px;border-radius:4px;
    border:1px solid var(--border);background:var(--white);cursor:pointer;font-family:'Lexend',sans-serif;
    transition:var(--transition);color:var(--dark)}
  .lesson-checklist-actions button:hover{border-color:var(--black);color:var(--black)}

  /* System detection banner */
  .system-detect{padding:14px 18px;border-radius:var(--radius);margin-bottom:20px;font-size:13px;
    line-height:1.5;display:flex;align-items:flex-start;gap:12px;border:1px solid var(--border);background:#F8F8F8}
  .system-detect.behind{border-color:var(--black);background:#F0F0F0}
  .system-detect .detect-icon{width:32px;height:32px;border-radius:50%;background:var(--black);color:#fff;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;font-weight:700}
  .system-detect .detect-text{flex:1}
  .system-detect .detect-title{font-weight:700;margin-bottom:2px}
  .system-detect .detect-detail{font-size:12px;color:var(--mid);line-height:1.45}

  /* AI Panel overlay */
  .ai-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;
    align-items:center;justify-content:center;animation:fadeIn .25s ease}
  .ai-panel{background:var(--white);border-radius:16px;width:560px;max-width:95vw;max-height:85vh;
    overflow-y:auto;box-shadow:var(--shadow-lg);animation:slideUp .3s ease}
  .ai-panel-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 0}
  .ai-panel-header h2{font-size:18px;font-weight:700}
  .ai-close{background:none;border:none;cursor:pointer;font-size:24px;color:var(--mid);line-height:1;font-family:'Lexend',sans-serif}
  .ai-panel-body{padding:16px 24px 24px}
  /* Performance slider */
  .perf-slider-section{background:#F8F8F8;border:1px solid var(--border);border-radius:var(--radius);
    padding:20px 24px;margin-bottom:20px}
  .perf-slider-label{font-size:13px;font-weight:700;margin-bottom:14px}
  .perf-tier-indicator{display:flex;justify-content:space-between;margin-bottom:10px;gap:4px}
  .tier-dot{font-size:10px;font-weight:600;color:var(--border);transition:all .2s;padding:4px 2px;flex:1;text-align:center;white-space:nowrap}
  .tier-dot.active{color:var(--black);border-bottom:2px solid var(--black)}
  .perf-slider-wrap{position:relative;padding:0 4px}
  .perf-slider-track{display:flex;align-items:center;gap:0}
  .perf-slider-track input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:6px;

let yearStartDate = new Date(2025, 8, 4); // Sep 4, 2025
let yearEndDate = new Date(2026, 5, 26); // Jun 26, 2026
let holidays = new Set(); // Store as 'YYYY-MM-DD' strings
let holidayLabels = {}; // dateKey -> label string

function dateToKey(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function formatDateDisplay(d) {
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

// US Bank / School Holidays
// Returns holidays for a given school year (startYear to startYear+1)
function getUSBankHolidays(startYear) {
  const endYear = startYear + 1;
  const list = [];

  // Helper: nth weekday of a month (1-indexed, dow: 0=Sun..6=Sat)
  function nthWeekday(year, month, dow, n) {
    const d = new Date(year, month, 1);
    let count = 0;
    while (count < n) {
      if (d.getDay() === dow) count++;
      if (count < n) d.setDate(d.getDate() + 1);
    }
    return d;
  }

  // Labor Day: 1st Monday of September (startYear)
  list.push({ date: nthWeekday(startYear, 8, 1, 1), label: 'Labor Day' });

  // Columbus Day / Indigenous Peoples Day: 2nd Monday of October
  list.push({ date: nthWeekday(startYear, 9, 1, 2), label: 'Indigenous Peoples Day' });

  // Veterans Day: Nov 11 (observed on nearest weekday if weekend)
  const vet = new Date(startYear, 10, 11);
  if (vet.getDay() === 0) vet.setDate(12);
  else if (vet.getDay() === 6) vet.setDate(10);
  list.push({ date: vet, label: 'Veterans Day' });

  // Thanksgiving: 4th Thursday of November + Friday after
  const tg = nthWeekday(startYear, 10, 4, 4);
  list.push({ date: new Date(tg), label: 'Thanksgiving' });
  const tgFri = new Date(tg);
  tgFri.setDate(tgFri.getDate() + 1);
  list.push({ date: tgFri, label: 'Thanksgiving Break' });

  // Winter Break: Dec 23 - Jan 2 (weekdays only)
  for (let d = new Date(startYear, 11, 23); d <= new Date(endYear, 0, 2); d.setDate(d.getDate() + 1)) {
    const dow = d.getDay();
    if (dow !== 0 && dow !== 6) {
      list.push({ date: new Date(d), label: 'Winter Break' });
    }
  }

  // New Year's Day: Jan 1 (already covered by winter break, but label it)

  // MLK Day: 3rd Monday of January
  list.push({ date: nthWeekday(endYear, 0, 1, 3), label: 'MLK Day' });

  // Presidents Day: 3rd Monday of February
  list.push({ date: nthWeekday(endYear, 1, 1, 3), label: "Presidents' Day" });

  // Spring Break: 3rd full week of March (Mon-Fri)
  const springMon = nthWeekday(endYear, 2, 1, 3);
  for (let i = 0; i < 5; i++) {
    const d = new Date(springMon);
    d.setDate(d.getDate() + i);
    list.push({ date: d, label: 'Spring Break' });
  }

  // Memorial Day: Last Monday of May
  const memDay = new Date(endYear, 4, 31);
  while (memDay.getDay() !== 1) memDay.setDate(memDay.getDate() - 1);
  list.push({ date: memDay, label: 'Memorial Day' });

  return list;
}

function prefillBankHolidays() {
  const bankHolidays = getUSBankHolidays(yearStartDate.getFullYear());
  bankHolidays.forEach(h => {
    const key = dateToKey(h.date);
    holidays.add(key);
    holidayLabels[key] = h.label;
  });
}

// Auto-prefill on load
prefillBankHolidays();

// Base total (no holidays removed)
const BASE_TOTAL_DAYS = UNITS.reduce((sum, u) => sum + unitTotalDays(u), 0);

// ============================================
// CALENDAR SCHEDULING ENGINE
// ============================================
// Walks real calendar days from yearStartDate, skipping weekends + holidays,
// and maps each unit to actual calendar date ranges + week milestones.

function buildSchedule() {
  const schedule = []; // one entry per unit: { unit, startDate, endDate, calendarWeeks, instrDays }
  let cursor = new Date(yearStartDate);
  let totalInstrDays = 0;

  for (const unit of UNITS) {
    // Use plan-aware day count: buildUnitDayItems respects skips and combines
    const needed = buildUnitDayItems(unit).length;
    let instrCount = 0;
    const unitStartDate = new Date(cursor);

    while (instrCount < needed) {
      const dow = cursor.getDay();
      const key = dateToKey(cursor);
      if (dow !== 0 && dow !== 6 && !holidays.has(key)) {
        instrCount++;
        totalInstrDays++;
      }
      if (instrCount < needed) {
        cursor.setDate(cursor.getDate() + 1);
      }
    }
    const unitEndDate = new Date(cursor);

    // Calendar weeks from year start to this unit's end
    const msFromStart = unitEndDate.getTime() - yearStartDate.getTime();
    const calWeeks = Math.round(msFromStart / (7 * 24 * 60 * 60 * 1000)) + 1;

    schedule.push({
      unit,
      startDate: unitStartDate,
      endDate: unitEndDate,
      calendarWeeks: calWeeks,
      instrDays: needed
    });

    // Move cursor to next day for the next unit
    cursor.setDate(cursor.getDate() + 1);
  }

  return { schedule, totalInstrDays };
}

// Compute how many instructional days have passed as of "today"
function computeCurrentDay() {
  const today = new Date(2026, 2, 24); // Simulated today: Mar 24, 2026
  let cursor = new Date(yearStartDate);
  let instrCount = 0;

  while (cursor <= today) {
    const dow = cursor.getDay();
    const key = dateToKey(cursor);
    if (dow !== 0 && dow !== 6 && !holidays.has(key)) {
      instrCount++;
    }
    cursor.setDate(cursor.getDate() + 1);
  }
  return instrCount;
}

function getTotalDays() {
  return buildSchedule().totalInstrDays;
}

function getCurrentDay() {
  return computeCurrentDay();
}

function buildStandardLessonMap(unit) {
  const allLessons = [];
  unit.sections.forEach(s => s.lessons.forEach(l => { if (!l.optional) allLessons.push(l.id); }));
  const map = {};
  const stds = unit.standards;
  stds.forEach((std, i) => {
    const chunkSize = Math.ceil(allLessons.length / stds.length);
    const start = i * chunkSize;
    map[std] = allLessons.slice(start, start + chunkSize);
  });
  return map;
}

function getLessonDate(unitId, lessonId) {
  const { schedule } = buildSchedule();
  const s = schedule.find(x => x.unit.id === unitId);
  if (!s) return null;
  const unit = s.unit;
  let cursor = new Date(s.startDate);
  let instrCount = 0;
  let lessonDay = 0;
  // Walk through unit days to find this lesson's date
  const allItems = buildUnitDayItems(unit);
  for (const item of allItems) {
    // Advance cursor to next instructional day
    while (true) {
      const dow = cursor.getDay();
      const key = dateToKey(cursor);
      if (dow !== 0 && dow !== 6 && !holidays.has(key)) {
        instrCount++;
        break;
      }
      cursor.setDate(cursor.getDate() + 1);
    }
    if (item.type === 'lesson' && item.lesson.id === lessonId) {
      return new Date(cursor);
    }
    if (item.type === 'combined' && item.lessons.some(l => l.id === lessonId)) {
      return new Date(cursor);
    }
    cursor.setDate(cursor.getDate() + 1);
  }
  return null;
}

function getAssessmentDate(unitId, assessType) {
  const { schedule } = buildSchedule();
  const s = schedule.find(x => x.unit.id === unitId);
  if (!s) return null;
  const unit = s.unit;
  const allItems = buildUnitDayItems(unit);
  let cursor = new Date(s.startDate);
  for (const item of allItems) {
    while (true) {
      const dow = cursor.getDay();
      const key = dateToKey(cursor);
      if (dow !== 0 && dow !== 6 && !holidays.has(key)) break;
      cursor.setDate(cursor.getDate() + 1);
    }
    if (item.type === 'assessment' && item.assess.type === assessType) {
      return new Date(cursor);
    }
    cursor.setDate(cursor.getDate() + 1);
  }
  return null;
}

// Build ordered list of day-items for a unit (lessons + assessments in correct order)
function buildUnitDayItems(unit) {
  const items = [];
  const planTags = (state.confirmedPlans && state.confirmedPlans[unit.id]) || {};
  const combinePairs = (state.confirmedPairs && state.confirmedPairs[unit.id]) || [];

  // Build set of "second" lessons in combine pairs (they share a day with the first)
  const combineSecondIds = new Set(combinePairs.map(p => p.b));

  unit.sections.forEach(sec => {
    sec.lessons.forEach(l => {
      const tag = planTags[l.id];

      // Skip lessons tagged as "skip"
      if (tag && tag.tag === 'skip') return;

      // If this is the second lesson in a combine pair, skip it as a separate day item
      // (it will be added as a co-item with the first lesson)
      if (combineSecondIds.has(l.id)) return;

      // Check if this is the first lesson in a combine pair
      const pair = combinePairs.find(p => p.a === l.id);
      if (pair) {
        // Add both lessons as a combined item (one day)
        const partnerLesson = { id: pair.b };
        unit.sections.forEach(s => s.lessons.forEach(ll => { if (ll.id === pair.b) partnerLesson.full = ll; }));
        items.push({ type: 'combined', lessons: [l, partnerLesson.full || { id: pair.b, name: 'Combined' }], section: sec });
      } else {
        items.push({ type: 'lesson', lesson: l, section: sec });
      }

      // Check if assessment falls after this lesson
      const assess = unit.assessments.find(a => a.afterLesson === l.id);
      if (assess) {
        items.push({ type: 'assessment', assess, section: sec });
      }

      // Also check assessment after the combined partner
      if (pair) {
        const assess2 = unit.assessments.find(a => a.afterLesson === pair.b);
        if (assess2) {
          items.push({ type: 'assessment', assess: assess2, section: sec });
        }
      }
    });
  });
  return items;
}

function navToday() {
  const today = new Date();
  const {schedule} = buildSchedule();
  // Find which unit contains today
  let targetUnit = null;
  for (const entry of schedule) {
    if (today >= entry.startDate && today <= entry.endDate) {
      targetUnit = entry.unit;
      break;
    }
  }
  // If today is before the first unit, go to unit 1; if after last, go to last unit
  if (!targetUnit) {
    if (schedule.length > 0 && today < schedule[0].startDate) {
      targetUnit = schedule[0].unit;
    } else if (schedule.length > 0) {
      targetUnit = schedule[schedule.length - 1].unit;
    }
  }
  if (targetUnit) {
    state.view = 'unit';
    state.unitId = targetUnit.id;
    state.lessonId = null;
    state.monthOffset = null;
    state.monthYear = null;
    render();
    // Scroll to today's cell if visible
    setTimeout(() => {
      const todayCell = document.querySelector('.k-month-cell.today-cell');
      if (todayCell) todayCell.scrollIntoView({behavior:'smooth', block:'center'});
    }, 100);
  }
}

function renderYearView() {
  const { schedule, totalInstrDays } = buildSchedule();
  const holidayNote = holidays.size > 0 ? ` &middot; ${holidays.size} holiday${holidays.size !== 1 ? 's' : ''}` : '';
  const selectedId = state.unitId || 1;
  const selectedUnit = UNITS.find(u => u.id === selectedId);

  const endYear = yearStartDate.getFullYear() + 1;
  let html = `<div class="year-view">
    <h1 class="year-title">Kindergarten ${yearStartDate.getFullYear()}&ndash;${endYear}</h1>
    <p class="year-subtitle" style="margin-bottom:16px">${totalInstrDays} instructional days &middot; 8 units${holidayNote}</p>
    <div class="timeline-wrapper">
      <div class="timeline">`;

  schedule.forEach(s => {
    const td = s.instrDays;
    const isSelected = s.unit.id === selectedId;
    const bg = isSelected ? 'background:var(--black);color:var(--white)' : '';
    html += `<div class="timeline-unit${isSelected ? ' selected' : ''}" style="flex:${td};${bg}" onclick="goUnit(${s.unit.id})">
      <span class="unit-num">Unit ${s.unit.id}</span>
      <span class="unit-short">${s.unit.short}</span>
      <span class="unit-days">${td} days</span>
    </div>`;
  });

  html += `</div><div class="day-ruler">`;
  schedule.forEach(s => {
    html += `<div class="day-ruler-seg" style="flex:${s.instrDays}">Week ${s.calendarWeeks}</div>`;
  });
  html += `</div></div>`;

  // Unit title + pacing insights
  const completed = getCompleted(selectedId);
  const totalLessons = [];
  const optLessons = [];
  selectedUnit.sections.forEach(s => s.lessons.forEach(l => {
    totalLessons.push(l);
    if (l.optional) optLessons.push(l);
  }));
  const instrDays = buildUnitDayItems(selectedUnit).length;

  // Rank all units by flex (optional count)
  const flexRanking = UNITS.map(u => ({ id: u.id, opt: u.optionalLessons.length })).sort((a,b) => b.opt - a.opt);
  const thisRank = flexRanking.findIndex(f => f.id === selectedId);
  const mostFlexUnits = flexRanking.filter(f => f.opt === flexRanking[0].opt);
  const leastFlexUnits = flexRanking.filter(f => f.opt === flexRanking[flexRanking.length-1].opt);

  const insights = [];

  // 1. Flex rating with cross-unit comparison
  if (mostFlexUnits.some(f => f.id === selectedId)) {
    insights.push(`Most flexible unit (${optLessons.length} optional lessons). Recover lost days here first.`);
  } else if (leastFlexUnits.some(f => f.id === selectedId)) {
    const topFlex = flexRanking.slice(0, 2).map(f => 'Unit ' + f.id);
    insights.push(`Tightest unit (${optLessons.length} optional). If you fall behind, ${topFlex.join(' and ')} have the most room to recover.`);
  } else {
    const topFlex = flexRanking.slice(0, 2).map(f => 'Unit ' + f.id);
    insights.push(`${optLessons.length} optional lesson${optLessons.length !== 1 ? 's' : ''} give moderate flex. ${topFlex.join(' and ')} have the most room to recover.`);
  }

  // 2. Buffer days (only show if positive)
  const bufferDays = instrDays - totalLessons.length - selectedUnit.assessments.length;
  if (bufferDays > 0) {
    insights.push(`${bufferDays} buffer day${bufferDays !== 1 ? 's' : ''} beyond lessons and assessments. Use for reteaching or enrichment.`);
  }

  // 3. Holiday count
  const unitEntry = schedule.find(s => s.unit.id === selectedId);
  if (unitEntry) {
    let holidayCount = 0;
    const hd = new Date(unitEntry.startDate);
    while (hd <= unitEntry.endDate) {
      const key = dateToKey(hd);
      if (holidays.has(key)) holidayCount++;
      hd.setDate(hd.getDate() + 1);
    }
    if (holidayCount > 0) {
      insights.push(`${holidayCount} holiday${holidayCount !== 1 ? 's' : ''} fall within this unit.`);
    }
  }

  // 4. Combine candidates (skip first pair in each section, suggest from middle/end of sections)
  const combineCandidates = [];
  selectedUnit.sections.forEach(sec => {
    for (let i = 2; i < sec.lessons.length - 1; i++) {
      const a = sec.lessons[i], b = sec.lessons[i+1];
      if (!a.optional && !b.optional) {
        combineCandidates.push([a, b]);
      }
    }
  });
  if (combineCandidates.length > 0) {
    const pair = combineCandidates[0];
    insights.push(`L${pair[0].id} + L${pair[1].id} are candidates to combine if you need to recover a day.`);
  }

  html += `<div style="padding:16px 0 8px">
    <div style="text-align:center;margin-bottom:12px">
      <span style="font-size:15px;font-weight:700">Unit ${selectedId}: ${selectedUnit.name}</span>
    </div>
    <div class="pacing-intel" style="margin:0">
      <div class="pacing-intel-title">Pacing Insights</div>
      <ul class="pacing-intel-list">
        ${insights.map(i => `<li>${i}</li>`).join('')}
      </ul>
    </div>
  </div>`;

  // Unit month calendar
  html += renderMonthCalendar(selectedUnit, completed);

  html += `</div>`;
  return html;
}

// REPORTS VIEW
// ============================================
function renderReportsView() {
  let html = `<div class="year-view">
    <h1 class="year-title">Standards Coverage Report</h1>
    <p class="year-subtitle" style="margin-bottom:24px">Assessment readiness by unit and standard</p>`;

  UNITS.forEach(unit => {
    const completed = getCompleted(unit.id);
    const stdMap = buildStandardLessonMap(unit);
    const allNonOptional = [];
    unit.sections.forEach(s => s.lessons.forEach(l => { if (!l.optional) allNonOptional.push(l.id); }));
    const completedNonOpt = allNonOptional.filter(id => completed.has(id)).length;
    const readinessPct = allNonOptional.length > 0 ? Math.round(completedNonOpt / allNonOptional.length * 100) : 0;

    const stdData = unit.standards.map(std => {
      const requiredLessons = stdMap[std] || [];
      const coveredCount = requiredLessons.filter(id => completed.has(id)).length;
      const isCovered = coveredCount === requiredLessons.length && requiredLessons.length > 0;
      const pct = requiredLessons.length > 0 ? Math.round(coveredCount / requiredLessons.length * 100) : 0;
      return { std, requiredLessons, coveredCount, isCovered, pct };
    });

// Build month calendar for a unit
function renderMonthCalendar(unit, completed) {
  const { schedule } = buildSchedule();
  const entry = schedule.find(s => s.unit.id === unit.id);
  if (!entry) return '';

  // Build a map: dateKey -> [items] for all days in the unit
  const dayMap = {};
  const items = buildUnitDayItems(unit);
  let cursor = new Date(entry.startDate);

  for (const item of items) {
    while (true) {
      const dow = cursor.getDay();
      const key = dateToKey(cursor);
      if (dow !== 0 && dow !== 6 && !holidays.has(key)) break;
      cursor.setDate(cursor.getDate() + 1);
    }
    const key = dateToKey(cursor);
    if (!dayMap[key]) dayMap[key] = [];
    dayMap[key].push(item);
    cursor.setDate(cursor.getDate() + 1);
  }

  const today = new Date();
  const todayKey = dateToKey(today);

  // Grid spans from the Monday of the unit's start week to Friday of the unit's end week
  let gridStart = new Date(entry.startDate);
  while (gridStart.getDay() !== 1) gridStart.setDate(gridStart.getDate() - 1);

  let gridEnd = new Date(entry.endDate);
  while (gridEnd.getDay() !== 5) gridEnd.setDate(gridEnd.getDate() + 1);

  // Month labels for week rows
  let html = `<div class="k-month-grid">`;

  const monthLabelShown = new Set();
  let d = new Date(gridStart);
  while (d <= gridEnd) {
    for (let dow = 1; dow <= 5; dow++) {
      while (d.getDay() !== dow) d.setDate(d.getDate() + 1);

      const key = dateToKey(d);
      const isToday = key === todayKey;
      const isHoliday = holidays.has(key);
      const dayItems = dayMap[key] || [];
      const isInUnit = d >= entry.startDate && d <= entry.endDate;

      let cellCls = 'k-month-cell';
      if (isToday) cellCls += ' today-cell';

      html += `<div class="${cellCls}">`;

      // Show month name on first weekday appearance of each month
      const monthKey = `${d.getFullYear()}-${d.getMonth()}`;
      const showMonth = !monthLabelShown.has(monthKey);
      if (showMonth) monthLabelShown.add(monthKey);
      const dateLabel = showMonth
        ? `${MONTHS_FULL[d.getMonth()].slice(0,3)} ${d.getDate()}`
        : `${d.getDate()}`;

      if (isToday) {
        html += `<div class="cell-date" style="color:#fff;background:#111;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px">${d.getDate()}</div>`;
      } else if (isInUnit) {
        html += `<div class="cell-date">${dateLabel}</div>`;
      } else {
        html += `<div class="cell-date" style="opacity:.3">${dateLabel}</div>`;
      }

      if (isHoliday) {
        const hLabel = holidayLabels[key] || 'Holiday';
        html += `<div class="cell-holiday">${hLabel}</div>`;
      }

      dayItems.forEach(item => {
        if (item.type === 'lesson') {
          const l = item.lesson;
          const isOpt = l.optional;
          const planTag = getPlanTag(unit.id, l.id);
          let cls = 'cell-lesson';
          if (isOpt) cls += ' optional';
          html += `<div class="${cls}" onclick="goLesson(${unit.id},${l.id})" title="Lesson ${l.id}: ${l.name}">
            <div style="font-weight:700;font-size:9px;color:var(--mid);text-transform:uppercase;letter-spacing:.3px">Lesson ${l.id}</div>
            <div style="font-weight:600;font-size:11px;margin-top:1px">${l.name}</div>`;
          if (planTag) html += `<div style="font-size:9px;font-weight:700;color:var(--light);margin-top:2px">${planTag.label}</div>`;
          if (isOpt) html += `<span class="opt-tag">Optional</span>`;
          html += `</div>`;
        } else if (item.type === 'combined') {
          const [lA, lB] = item.lessons;
          html += `<div class="cell-lesson" onclick="goLesson(${unit.id},${lA.id})" title="Combined: Lesson ${lA.id} + ${lB.id}" style="border-left:3px solid var(--dark)">
            <div style="font-weight:700;font-size:9px;color:var(--mid);text-transform:uppercase;letter-spacing:.3px">Lessons ${lA.id} + ${lB.id}</div>
            <div style="font-weight:600;font-size:11px;margin-top:1px">${lA.name}</div>
            <div style="font-weight:600;font-size:10px;color:var(--mid);margin-top:1px">+ ${lB.name}</div>
            <div style="font-size:9px;font-weight:700;color:var(--light);margin-top:2px">Combined</div>
          </div>`;
        } else if (item.type === 'assessment') {
          const a = item.assess;
          html += `<div class="cell-lesson assessment" title="${a.label}" onclick="goAssessment(${unit.id},'${a.type}')" style="cursor:pointer">
            ${a.label}
          </div>`;
        }
      });

      html += `</div>`;
      d.setDate(d.getDate() + 1);
    }
  }

  html += `</div>`;
  return html;
}

// Detect if the class is behind for a given unit
function detectBehind(unit) {
  const { schedule } = buildSchedule();
  const entry = schedule.find(s => s.unit.id === unit.id);
  if (!entry) return { behind: false, daysUsed: 0, daysTotal: 0, pctThrough: 0 };

  const today = new Date(2026, 2, 24); // simulated today
  const unitStart = entry.startDate;
  const unitEnd = entry.endDate;

  // Compute lesson counts for all paths
  const completed = getCompleted(unit.id);
  const allNonOptional = [];
  unit.sections.forEach(s => s.lessons.forEach(l => { if (!l.optional) allNonOptional.push(l); }));
  const completedCount = allNonOptional.filter(l => completed.has(l.id)).length;

  // Next assessment
  let nextAssess = null;
  const midAssess = unit.assessments.find(a => a.type === 'formative');
  const endAssess = unit.assessments.find(a => a.type === 'summative');
  if (midAssess && completedCount < midAssess.afterLesson) {
    nextAssess = { label: midAssess.label, lessonsAway: midAssess.afterLesson - completedCount };
  } else if (endAssess) {
    nextAssess = { label: endAssess.label, lessonsAway: Math.max(0, allNonOptional.length - completedCount) };
  }

  // If we haven't started this unit yet or already past it
  if (today < unitStart) return { behind: false, daysUsed: 0, daysTotal: entry.instrDays, pctThrough: 0, status: 'upcoming', completedCount, totalRequired: allNonOptional.length, nextAssess };
  if (today > unitEnd) return { behind: completedCount < allNonOptional.length, daysUsed: entry.instrDays, daysTotal: entry.instrDays, pctThrough: 100, status: 'complete', completedCount, totalRequired: allNonOptional.length, nextAssess };

  // Count instructional days from unit start to today
  let cursor = new Date(unitStart);
  let daysUsed = 0;
  while (cursor <= today) {
    const dow = cursor.getDay();
    const key = dateToKey(cursor);
    if (dow !== 0 && dow !== 6 && !holidays.has(key)) daysUsed++;
    cursor.setDate(cursor.getDate() + 1);
  }

  // Expected progress: how many lessons should be done given days used
  const expectedProgress = Math.floor((daysUsed / entry.instrDays) * allNonOptional.length);
  const behind = completedCount < expectedProgress - 1; // 1 lesson grace

  return {
    behind,
    daysUsed,
    daysTotal: entry.instrDays,
    pctThrough: Math.round((daysUsed / entry.instrDays) * 100),
    completedCount,
    expectedProgress,
    totalRequired: allNonOptional.length,
    nextAssess,
    status: 'in-progress'
  };
}

function switchAssessTarget(type) {
  state.targetAssess = type;
  const unit = UNITS.find(x => x.id === state.unitId);
  if (!unit) return;

  if (modifyState.active) {
    // Stay in Modify mode: update toggle styling, progress display, and plan steps
    const toggleBtns = document.querySelectorAll('#assessTargetToggle button');
    if (toggleBtns.length === 2) {
      const midAssess = unit.assessments.find(a => a.type === 'formative');
      const endAssess = unit.assessments.find(a => a.type === 'summative');
      const isMid = type === 'mid';
      toggleBtns[0].style.background = isMid ? 'var(--black)' : 'var(--white)';
      toggleBtns[0].style.color = isMid ? '#fff' : 'var(--mid)';
      toggleBtns[1].style.background = !isMid ? 'var(--black)' : 'var(--white)';
      toggleBtns[1].style.color = !isMid ? '#fff' : 'var(--mid)';
    }
    // Recompute max recoverable for the new scope
    const allNonOpt = [];
    unit.sections.forEach(s => s.lessons.forEach(l => { if (!l.optional) allNonOpt.push(l); }));
    const completed = getCompleted(unit.id);
    const midAssess = unit.assessments.find(a => a.type === 'formative');
    let scopedRemaining = allNonOpt.filter(l => !completed.has(l.id));
    if (type === 'mid' && midAssess) {
      scopedRemaining = allNonOpt.filter(l => l.id <= midAssess.afterLesson && !completed.has(l.id));
    }
    const optSkippable = unit.optionalLessons.filter(id => !completed.has(id));
    const pairsAvail = findCombinablePairs(unit, scopedRemaining);
    modifyState.maxRecoverable = optSkippable.length + pairsAvail.length;
    // Update the recoverable hint
    const recoverHint = document.querySelector('.impact-item div[style*="font-size:10px"]');
    if (recoverHint) recoverHint.textContent = modifyState.maxRecoverable + ' recoverable';
    // Update progress display and plan steps
    rebuildPlanSteps(unit.id);
    return;
  }

  const planArea = document.getElementById('aiPlanArea');
  if (planArea) planArea.innerHTML = buildModePlan(unit, 'assessment');
}

function switchAIMode(mode) {
  state.aiMode = mode;
  const unit = UNITS.find(x => x.id === state.unitId);
  if (!unit) return;
  // Update mode button active states
  document.querySelectorAll('.mode-option').forEach(btn => {
    btn.classList.remove('active');
    if ((mode === 'performance' && btn.textContent.includes('Student')) ||
        (mode === 'assessment' && btn.textContent.includes('Assessment'))) {

    }

  const planArea = document.getElementById('aiPlanArea');
  if (planArea) planArea.innerHTML = buildModePlan(unit, mode);
}

// Helper: find combinable lesson pairs (lessons in same section covering similar standards)
// Each lesson can only appear in one pair.
function findCombinablePairs(unit, remaining) {
  const pairs = [];
  const used = new Set();
  unit.sections.forEach(section => {
    const sectionRemaining = section.lessons.filter(l => remaining.find(r => r.id === l.id) && !l.optional);
    for (let i = 0; i < sectionRemaining.length - 1; i++) {
      const a = sectionRemaining[i];
      const b = sectionRemaining[i + 1];
      // Skip if either lesson is already used in another pair
      if (used.has(a.id) || used.has(b.id)) continue;
      pairs.push({ a, b, section: section.id, reason: `Both build toward ${section.name}` });
      used.add(a.id);
      used.add(b.id);
    }
  });
  return pairs;
}

// Helper: identify high-priority lessons (those mapping to the most assessed standards)
function findHighPriorityLessons(unit, remaining) {
  const stdMap = buildStandardLessonMap(unit);
  const lessonPriority = [];
  remaining.forEach(lesson => {
    let stdCount = 0;
    const matchedStds = [];
    unit.standards.forEach(std => {
      if ((stdMap[std] || []).includes(lesson.id)) { stdCount++; matchedStds.push(std); }
    });
    lessonPriority.push({ lesson, stdCount, matchedStds });
  });
  lessonPriority.sort((a, b) => b.stdCount - a.stdCount);
  return lessonPriority;
}

function getPerformanceTier(val) {
  if (val <= 25) return 'developing';
  if (val <= 50) return 'approaching';
  if (val <= 75) return 'mastery';
  return 'exceeds';
}

function buildPerformancePlan(unit, perfVal) {
  const completed = getCompleted(unit.id);
  const allNonOptional = [];
  unit.sections.forEach(s => s.lessons.forEach(l => { if (!l.optional) allNonOptional.push(l); }));
  const remaining = allNonOptional.filter(l => !completed.has(l.id));
  const completedCount = allNonOptional.filter(l => completed.has(l.id)).length;

  const steps = [];
  let daysRecovered = 0;
  const tier = getPerformanceTier(perfVal);

  if (tier === 'developing') {
    // Developing: slow down, reteach, add practice
    // 1. Reteach foundational standards
    const foundational = unit.standards.slice(0, 2);
    steps.push({
      title: `Reteach ${foundational.length} foundational standard${foundational.length !== 1 ? 's' : ''}`,
      detail: `Add practice days for ${foundational.join(' and ')}. Use small-group instruction to close gaps before moving on.`,
      tag: 'reteach', tagClass: 'tag-review'
    });

    // 2. Keep all required lessons (slow down, don't skip)
    steps.push({
      title: `Keep all ${remaining.length} remaining lessons at full depth`,
      detail: 'Students need more time with this content. Prioritize understanding over coverage.',
      tag: 'keep', tagClass: 'tag-keep'
    });

    // 3. Skip optional to make room for reteach
    if (unit.optionalLessons.length > 0) {
      const optNames = unit.optionalLessons.map(id => {
        let name = '';
        unit.sections.forEach(s => s.lessons.forEach(l => { if (l.id === id) name = l.name; }));
        return `L${id}: ${name}`;
      });
      steps.push({
        title: `Skip ${unit.optionalLessons.length} optional lesson${unit.optionalLessons.length !== 1 ? 's' : ''} to make room for reteach`,
        detail: optNames.join(', '),
        tag: 'skip', tagClass: 'tag-skip'
      });
    }

    // 4. Add structured practice
    steps.push({
      title: 'Add a structured practice session',
      detail: `Dedicate a day to hands-on practice with ${foundational[0] || unit.standards[0]} using manipulatives and partner work.`,
      tag: 'practice', tagClass: 'tag-combine'
    });

  } else if (tier === 'approaching') {
    // Approaching: reinforce, keep optionals, steady pace
    // 1. Reinforce key lessons
    const priority = findHighPriorityLessons(unit, remaining);
    const reinforceLessons = priority.slice(0, Math.min(4, priority.length));
    if (reinforceLessons.length > 0) {
      const names = reinforceLessons.map(p => `L${p.lesson.id}: ${p.lesson.name}`);
      steps.push({
        title: `Reinforce ${reinforceLessons.length} key lesson${reinforceLessons.length !== 1 ? 's' : ''} with extended practice`,
        detail: names.join(', '),
        tag: 'reinforce', tagClass: 'tag-keep'
      });
    }

    // 2. Include optional content for extra practice
    if (unit.optionalLessons.length > 0) {
      const optNames = unit.optionalLessons.map(id => {
        let name = '';
        unit.sections.forEach(s => s.lessons.forEach(l => { if (l.id === id) name = l.name; }));
        return `L${id}: ${name}`;
      });
      steps.push({
        title: 'Include optional lessons for additional practice',
        detail: optNames.join(', '),
        tag: 'reinforce', tagClass: 'tag-review'
      });
    }

    // 3. Review before assessment
    steps.push({
      title: 'Add a structured review session before the assessment',
      detail: `Revisit ${unit.standards.slice(0,2).join(' and ')} through guided practice and formative checks.`,
      tag: 'review', tagClass: 'tag-review'
    });

  } else if (tier === 'mastery') {
    // On Track: continue as planned, include enrichment if room
    steps.push({
      title: 'Continue current pacing',
      detail: `${completedCount} of ${allNonOptional.length} required lessons completed. Class is performing well.`,
      tag: 'on track', tagClass: 'tag-keep'
    });

    if (unit.optionalLessons.length > 0) {
      const optNames = unit.optionalLessons.map(id => {
        let name = '';
        unit.sections.forEach(s => s.lessons.forEach(l => { if (l.id === id) name = l.name; }));
        return `L${id}: ${name}`;
      });
      steps.push({
        title: 'Include optional lessons if time allows',
        detail: optNames.join(', '),
        tag: 'optional', tagClass: 'tag-review'
      });
    }

    steps.push({
      title: 'Add a structured review session before the assessment',
      detail: `Revisit ${unit.standards.slice(0,2).join(' and ')} through guided practice and formative checks.`,
      tag: 'review', tagClass: 'tag-review'
    });

  } else {
    // Excelling: accelerate, combine, skip reinforcement, enrich
    // 1. Combine lessons to accelerate
    const pairs = findCombinablePairs(unit, remaining);
    if (pairs.length > 0) {
      const pairDescs = pairs.map(p => `L${p.a.id} + L${p.b.id}`);
      steps.push({
        title: `Combine ${pairs.length} lesson pair${pairs.length !== 1 ? 's' : ''} to recover ${pairs.length} day${pairs.length !== 1 ? 's' : ''}`,
        detail: pairDescs.join(', '),
        tag: 'combine', tagClass: 'tag-combine'
      });
      daysRecovered += pairs.length;
    }

    // 2. Skip optional (students don't need the reinforcement)
    if (unit.optionalLessons.length > 0) {
      const optNames = unit.optionalLessons.map(id => {
        let name = '';
        unit.sections.forEach(s => s.lessons.forEach(l => { if (l.id === id) name = l.name; }));
        return `L${id}: ${name}`;
      });
      steps.push({
        title: `Skip ${unit.optionalLessons.length} optional lesson${unit.optionalLessons.length !== 1 ? 's' : ''} to recover ${unit.optionalLessons.length} day${unit.optionalLessons.length !== 1 ? 's' : ''}`,
        detail: optNames.join(', ') + '. Students have demonstrated understanding.',
        tag: 'skip', tagClass: 'tag-skip'
      });
      daysRecovered += unit.optionalLessons.length;
    }

    // 3. Enrich with extension activities
    const priority = findHighPriorityLessons(unit, remaining);
    const extendLessons = priority.slice(0, 3);
    if (extendLessons.length > 0) {
      const extendList = extendLessons.map(p => `L${p.lesson.id}: ${p.lesson.name}`);
      steps.push({
        title: 'Add enrichment activities to deepen understanding',
        detail: extendList.join(', ') + '. Add problem-solving challenges and peer teaching.',
        tag: 'enrich', tagClass: 'tag-keep'
      });
    }

    // 4. Consider moving ahead
    steps.push({
      title: 'Use recovered days to begin the next unit early',
      detail: `With ${daysRecovered} day${daysRecovered !== 1 ? 's' : ''} recovered, consider starting Unit ${unit.id + 1} to build momentum.`,
      tag: 'accelerate', tagClass: 'tag-combine'
    });
  }

  return { steps, daysRecovered, remaining };
}

function buildModePlan(unit, mode) {
  const completed = getCompleted(unit.id);
  const allNonOptional = [];
  unit.sections.forEach(s => s.lessons.forEach(l => { if (!l.optional) allNonOptional.push(l); }));
  const remaining = allNonOptional.filter(l => !completed.has(l.id));

  let steps = [];
  let daysRecovered = 0;
  let sliderHtml = '';

  if (mode === 'performance') {
    // Show slider, then plan based on slider value
    const perfVal = state.perfSlider || 50;
    const tier = getPerformanceTier(perfVal);
    sliderHtml = `<div class="perf-slider-section">
      <div class="perf-slider-label">How is your class performing on this unit's standards?</div>
      <div class="perf-tier-indicator">
        <span class="tier-dot${tier === 'developing' ? ' active' : ''}" data-tier="developing">Developing</span>
        <span class="tier-dot${tier === 'approaching' ? ' active' : ''}" data-tier="approaching">Approaching</span>
        <span class="tier-dot${tier === 'mastery' ? ' active' : ''}" data-tier="mastery">Mastery</span>
        <span class="tier-dot${tier === 'exceeds' ? ' active' : ''}" data-tier="exceeds">Exceeds</span>
      </div>
      <div class="perf-slider-wrap">
        <div class="perf-slider-track">
          <input type="range" min="0" max="100" value="${perfVal}" oninput="onPerfSlider(this.value)">
        </div>
      </div>
      <div class="perf-slider-desc" id="perfSliderDesc">${getPerfDescription(perfVal)}</div>
    </div>`;

    const plan = buildPerformancePlan(unit, perfVal);
    steps = plan.steps;
    daysRecovered = plan.daysRecovered;

  } else if (mode === 'assessment') {
    // Approaching Assessment mode: auto-detect progress toward assessment
    const completedCount = allNonOptional.filter(l => completed.has(l.id)).length;

    // Find both assessments
    const midAssess = unit.assessments.find(a => a.type === 'formative');
    const endAssess = unit.assessments.find(a => a.type === 'summative');

    // Determine which assessment to target
    // Default: auto-detect next one, but teacher can override via state.targetAssess
    let targetAssess = null;
    let lessonsUntilAssess = 0;
    const targetType = state.targetAssess || 'auto';

    if (targetType === 'mid' && midAssess) {
      targetAssess = midAssess;
      const nonOptBeforeAssess = allNonOptional.filter(l => l.id <= midAssess.afterLesson && !completed.has(l.id));
      lessonsUntilAssess = nonOptBeforeAssess.length;
    } else if (targetType === 'end' && endAssess) {
      targetAssess = endAssess;
      lessonsUntilAssess = remaining.length;
    } else {
      // Auto: pick whichever is next
      if (midAssess && completedCount < midAssess.afterLesson) {
        targetAssess = midAssess;
        const nonOptBeforeAssess = allNonOptional.filter(l => l.id <= midAssess.afterLesson && !completed.has(l.id));
        lessonsUntilAssess = nonOptBeforeAssess.length;
      } else if (endAssess) {
        targetAssess = endAssess;
        lessonsUntilAssess = remaining.length;
      }
    }

    const assessLabel = targetAssess ? targetAssess.label : 'End-of-Unit Assessment';
    const isMidTarget = targetAssess && targetAssess.type === 'formative';
    const isEndTarget = targetAssess && targetAssess.type === 'summative';

    // Progress bar: scoped to the target assessment's lesson range
    let progressTotal = allNonOptional.length;
    let progressDone = completedCount;
    if (isMidTarget && midAssess) {
      const beforeMid = allNonOptional.filter(l => l.id <= midAssess.afterLesson);
      progressTotal = beforeMid.length;
      progressDone = beforeMid.filter(l => completed.has(l.id)).length;
    }
    const progressPct = progressTotal > 0 ? Math.round((progressDone / progressTotal) * 100) : 0;

    sliderHtml = `<div class="perf-slider-section" style="display:block">
      <div style="display:flex;justify-content:space-between;margin-bottom:12px">
        <div>
          <div style="font-size:13px;font-weight:700">Progress toward ${assessLabel}</div>
          <div style="font-size:12px;color:var(--mid);margin-top:2px">${progressDone} of ${progressTotal} required lessons completed</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:22px;font-weight:700">${lessonsUntilAssess}</div>
          <div style="font-size:11px;color:var(--mid)">lessons remaining</div>
        </div>
      </div>
      <div style="height:6px;background:#E0E0E0;border-radius:3px;overflow:hidden">
        <div style="height:100%;background:var(--black);border-radius:3px;width:${progressPct}%;transition:width .6s ease"></div>
      </div>
    </div>`;

    // Scope remaining lessons to target assessment
    let scopedRemaining = remaining;
    if (isMidTarget && midAssess) {
      scopedRemaining = allNonOptional.filter(l => l.id <= midAssess.afterLesson && !completed.has(l.id));
    }

    // Identify which remaining lessons directly map to assessed standards
    const stdMap = buildStandardLessonMap(unit);
    const criticalLessonIds = new Set();
    unit.standards.forEach(std => {
      (stdMap[std] || []).forEach(id => {
        if (scopedRemaining.find(l => l.id === id)) criticalLessonIds.add(id);
      });
    });

    // 1. Keep critical lessons
    if (criticalLessonIds.size > 0) {
      const criticalNames = [...criticalLessonIds].map(id => {
        let name = '';
        unit.sections.forEach(s => s.lessons.forEach(l => { if (l.id === id) name = l.name; }));
        return `L${id}: ${name}`;
      });
      steps.push({
        title: `Keep ${criticalLessonIds.size} lesson${criticalLessonIds.size !== 1 ? 's' : ''} directly aligned to the assessment`,
        detail: criticalNames.join(', '),
        tag: 'keep', tagClass: 'tag-keep'
      });
    }

    // 2. Skip optional lessons
    const optRemaining = unit.optionalLessons.filter(id => !completed.has(id));
    if (optRemaining.length > 0) {
      const optNames = optRemaining.map(id => {
        let name = '';
        unit.sections.forEach(s => s.lessons.forEach(l => { if (l.id === id) name = l.name; }));
        return `L${id}: ${name}`;
      });
      steps.push({
        title: `Skip ${optRemaining.length} optional lesson${optRemaining.length !== 1 ? 's' : ''} to recover ${optRemaining.length} day${optRemaining.length !== 1 ? 's' : ''}`,
        detail: optNames.join(', '),
        tag: 'skip', tagClass: 'tag-skip'
      });
      daysRecovered += optRemaining.length;
    }

    // 3. Combine lesson pairs
    if (lessonsUntilAssess > 5) {
      const pairs = findCombinablePairs(unit, scopedRemaining);
      if (pairs.length > 0) {
        const pairDescs = pairs.map(p => `L${p.a.id} + L${p.b.id}`);
        steps.push({
          title: `Combine ${pairs.length} lesson pair${pairs.length !== 1 ? 's' : ''} to recover ${pairs.length} day${pairs.length !== 1 ? 's' : ''}`,
          detail: pairDescs.join(', '),
          tag: 'combine', tagClass: 'tag-combine'
        });
        daysRecovered += pairs.length;
      }
    }

  }

  let stepsHtml = sliderHtml;
  stepsHtml += `<div style="font-size:12px;font-weight:600;color:var(--mid);text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px">Suggested Plan</div>`;

  steps.forEach((s, i) => {
    stepsHtml += `<div class="ai-plan-step">
      <div class="step-num">${i + 1}</div>
      <div class="step-body">
        <div class="step-title">${s.title}</div>
        <div class="step-detail">${s.detail}</div>
        <span class="step-tag ${s.tagClass}">${s.tag}</span>
      </div>
    </div>`;
  });

  stepsHtml += `<div class="ai-plan-actions">
    <button class="btn-confirm" onclick="confirmPlan(${unit.id})">Confirm Plan</button>
    <button class="btn-adjust" onclick="enableModify(${unit.id})">Modify</button>
  </div>`;

  return stepsHtml;
}

function onPerfSlider(val) {
  state.perfSlider = parseInt(val);
  const desc = document.getElementById('perfSliderDesc');
  if (desc) desc.textContent = getPerfDescription(state.perfSlider);
  // Update tier indicators
  const tier = getPerformanceTier(state.perfSlider);
  document.querySelectorAll('.tier-dot').forEach(d => {
    d.classList.toggle('active', d.dataset.tier === tier);
  });
  // Re-render plan
  const unit = UNITS.find(x => x.id === state.unitId);
  if (unit) {
    const planArea = document.getElementById('aiPlanArea');
    if (planArea) planArea.innerHTML = buildModePlan(unit, 'performance');
  }
}

function getPerfDescription(val) {
  const tier = getPerformanceTier(val);
  if (tier === 'developing') return 'Students need more time with foundational concepts. The plan slows down, adds reteach days, and prioritizes depth over coverage.';
  if (tier === 'approaching') return 'Students are building understanding but need reinforcement. The plan maintains pace with extended practice on key lessons.';
  if (tier === 'mastery') return 'Students are meeting expectations. The plan continues current pacing with optional content and review before the assessment.';
  return 'Students are exceeding expectations. The plan accelerates by combining lessons, skipping reinforcement, and adding enrichment.';
}

function renderAIPanel(unit) {
  const mode = state.aiMode || 'performance';

  let html = `<div class="ai-overlay" onclick="if(event.target===this)closeAIPanel()">

      <div class="ai-panel-header">
        <h2>Adjust Pacing: Unit ${unit.id}</h2>

      </div>
      <div class="ai-panel-body">
        <div class="mode-selector">
          <button class="mode-option${mode === 'assessment' ? ' active' : ''}" onclick="switchAIMode('assessment')">
            <span class="mode-title">Approaching Assessment</span>

          <button class="mode-option${mode === 'performance' ? ' active' : ''}" onclick="switchAIMode('performance')">
            <span class="mode-title"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="vertical-align:-2px;margin-right:4px"><circle cx="12" cy="12" r="12" fill="#7C6CB0"/><path d="M12 5.5L7.5 17h2.3l.7-2h3l.7 2h2.3L12 5.5zm0 4.5l1 3h-2l1-3z" fill="white"/><path d="M12 4l1.2 2.5h-2.4L12 4z" fill="white"/></svg>Class Performance</span>
